<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Channels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <nav class="w-full max-w-4xl mb-4 p-4 bg-gray-800 rounded-lg flex justify-between items-center shadow-lg border border-gray-700">
        <div class="flex gap-4">
            <a href="channels.html" class="text-white font-semibold border-b-2 border-blue-400">Channels</a>
        </div>
        <div class="flex gap-4 items-center">
            <div id="session-timer" class="hidden flex items-center gap-1.5 px-3 py-1 bg-gray-900 border border-gray-700 rounded-full text-xs font-mono text-gray-400 shadow-inner">
                <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                <span id="time-remaining">--:--</span>
            </div>

            <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </nav>

    <main class="w-full max-w-4xl">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl border border-gray-700">
            <h1 class="text-3xl font-extrabold text-blue-400 mb-8 text-center">Subscribed Channels</h1>

            <div id="loader" class="flex flex-col items-center justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-gray-400">Fetching your channels...</p>
            </div>

            <div id="error-message" class="hidden text-center py-8">
                <p class="text-red-400 mb-4"></p>
                <button onclick="location.reload()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-white">Retry</button>
            </div>

            <div id="channel-grid" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 gap-6">
                </div>
            
            <p id="no-channels-message" class="hidden text-gray-400 col-span-full text-center py-4">
                You are not subscribed to any channels yet.
            </p>
        </div>
    </main>

    <script>
        // Initialize icons
        lucide.createIcons();

        // --- AUTH CHECK ---
        const token = localStorage.getItem('fromm_access_token');
        if (!token) {
            // Redirect to login if no token is found
            window.location.href = 'index.html';
        }


        // --- SESSION TIMER ---
        function startSessionTimer() {
            const expiryStr = localStorage.getItem('fromm_token_expiry');
            if (!expiryStr) return; 
            
            const expiryTimestamp = parseInt(expiryStr, 10);
            const timerContainer = document.getElementById('session-timer');
            const timeSpan = document.getElementById('time-remaining');
            
            // Show the timer
            timerContainer.classList.remove('hidden');

            function updateTimer() {
                const now = Math.floor(Date.now() / 1000);
                const diff = expiryTimestamp - now;

                if (diff <= 0) {
                    timeSpan.textContent = "Expired";
                    timeSpan.className = "text-red-500 font-bold";
                    timerContainer.classList.add('border-red-500', 'bg-red-900/20');
                    clearInterval(timerInterval);
                    return;
                }

                // Calculate time units
                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;

                // Format the display nicely
                if (hours > 0) {
                    timeSpan.textContent = `${hours}h ${minutes}m`;
                } else {
                    timeSpan.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }

                // Add a visual warning when under 5 minutes (300 seconds)
                if (diff <= 300) {
                    timeSpan.className = "text-yellow-400 font-bold animate-pulse";
                    timerContainer.classList.add('border-yellow-600');
                }
            }

            updateTimer(); // Run immediately so there is no 1-second delay
            const timerInterval = setInterval(updateTimer, 1000);
        }

        startSessionTimer();

        // --- LOGOUT LOGIC ---
        document.getElementById('logout-btn').addEventListener('click', () => {
            // Surgically remove only the login session data
            localStorage.removeItem('fromm_access_token');
            localStorage.removeItem('fromm_refresh_token');
            localStorage.removeItem('fromm_resource_token');
            localStorage.removeItem('fromm_token_expiry');
            localStorage.removeItem('fromm_device_id');

            window.location.replace('index.html');
        });

        // --- FETCH CHANNELS ---
        async function fetchChannels() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('channel-grid');
            const errorContainer = document.getElementById('error-message');
            const noChannelsMsg = document.getElementById('no-channels-message');

            try {
                // The channel API endpoint (extracted from channel_api.py)
                const response = await fetch('https://channel-api.frommyarti.com/channels', {
                    method: 'GET',
                    headers: {
                        'Authorization': token, // The API uses the raw token without "Bearer"
                        'uuid': crypto.randomUUID(), // Dynamic UUID required by the API
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    throw new Error("Session expired. Please log in again.");
                }

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success && data.data && data.data.channels) {
                    const channels = data.data.channels;
                    const subscribedChannels = channels.filter(c => c.isSubscribed);

                    if (subscribedChannels.length === 0) {
                        loader.classList.add('hidden');
                        noChannelsMsg.classList.remove('hidden');
                        return;
                    }

                    // Build HTML for each subscribed channel
                    let html = '';
                    subscribedChannels.forEach(channel => {
                        const subtext = (channel.searchChannelName && channel.searchChannelName.default) 
                            ? `<p class="text-sm text-gray-400 truncate px-1">${channel.searchChannelName.default}</p>` 
                            : '';

                        html += `
                            <a href="videos.html?channel_id=${channel.id}" 
                               class="block bg-gray-700 p-5 pt-6 rounded-xl hover:bg-gray-600 transition-all duration-200 shadow-lg text-center aspect-square flex flex-col justify-between border border-gray-600 hover:border-blue-400 group">
                                
                                <div class="w-24 h-24 bg-gray-600 rounded-full mb-4 mx-auto overflow-hidden border-2 border-gray-500 group-hover:border-blue-400 transition-colors flex-shrink-0">
                                    <img src="${channel.profileUrl}" alt="${channel.channelName} profile" class="w-full h-full object-cover">
                                </div>
                                
                                <h2 class="font-bold text-lg text-white px-1 mt-auto truncate" title="${channel.channelName}">
                                    ${channel.channelName}
                                </h2>
                                
                                ${subtext}
                                
                                <p class="text-xs text-blue-400 mt-2 font-medium uppercase tracking-wider flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                    View Videos
                                </p>
                            </a>
                        `;
                    });

                    // Hide loader and show grid
                    loader.classList.add('hidden');
                    grid.innerHTML = html;
                    grid.classList.remove('hidden');
                } else {
                    throw new Error("Invalid data format received from API.");
                }

            } catch (err) {
                console.error(err);
                loader.classList.add('hidden');
                errorContainer.classList.remove('hidden');
                
                const errMsg = errorContainer.querySelector('p');
                errMsg.textContent = err.message;

                // If unauthorized, clear token and auto-redirect after 2 seconds
                if (err.message.includes("Session expired")) {
                    localStorage.clear();
                    setTimeout(() => window.location.href = 'index.html', 2000);
                }
            }
        }

        // Execute on load
        fetchChannels();
    </script>
</body>
</html>
