<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            background: #4b5563;
            /* A nice visible gray track */
            height: 4px;
            /* Thickness of the line */
            border-radius: 4px;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* Draw the custom white drag circle for Chrome/Safari/Edge */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
            margin-top: -4px;
            /* Perfectly centers the dot on the line */
        }

        /* Draw the custom white drag circle for Firefox */
        input[type=range]::-moz-range-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
        }

        /* Hide scrollbar for menus */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Smooth fading for controls & Idle state hiding */
        .controls-overlay {
            transition: opacity 0.3s ease;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .player-wrapper:hover:not(.idle) .controls-overlay {
            opacity: 1;
        }

        /* Auto-hide cursor when idle (Forced on all children) */
        .player-wrapper.idle,
        .player-wrapper.idle * {
            cursor: none !important;
        }

        #video {
            transition: transform 0.3s ease-in-out;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Custom Subtitle Overlay Styling */
        .custom-cue {
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            font-family: sans-serif;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px black;
            border-radius: 4px;
            padding: 4px 8px;
            display: inline-block;
            line-height: 1.4;
        }

        /* Dynamic Subtitle Positioning: Rest near bottom, glide up when controls show */
        #custom-subtitle-container {
            bottom: 20px;
            transition: transform 0.3s ease;
        }

        .player-wrapper:hover:not(.idle) #custom-subtitle-container {
            transform: translateY(-64px);
        }

        .landscape-mode {
            aspect-ratio: 16/9 !important;
        }

        .player-wrapper:fullscreen {
            aspect-ratio: auto;
        }

        .player-wrapper:fullscreen #video {
            object-fit: contain;
        }

        /* Overlays (YouTube Hybrid 20/60/20 Split) */
        .click-overlay {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 20%;
            z-index: 15;
        }

        #skip-overlay-left {
            left: 0;
        }

        #skip-overlay-right {
            right: 0;
        }

        #middle-click-overlay {
            left: 20%;
            width: 60%;
        }

        /* Feedback icons */
        .skip-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .show-skip-feedback .skip-feedback {
            animation: fadeOut 0.5s ease;
        }

        @keyframes fadeOut {
            0% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(0.9);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>

<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <nav
        class="w-full max-w-4xl mb-4 p-4 bg-gray-800 rounded-lg flex justify-between items-center shadow border border-gray-700">
        <div class="flex gap-4">
            <a href="channels.html" class="text-blue-400 hover:text-blue-300 transition-colors">Channels</a>
            <a href="#" id="back-to-videos" class="text-blue-400 hover:text-blue-300 transition-colors">Videos</a>
        </div>
        <div class="flex gap-4 items-center">
            <div id="session-timer"
                class="hidden flex items-center gap-1.5 px-3 py-1 bg-gray-900 border border-gray-700 rounded-full text-xs font-mono text-gray-400 shadow-inner">
                <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                <span id="time-remaining">--:--</span>
            </div>

            <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </nav>

    <main class="w-full max-w-4xl">
        <div class="mb-4 flex justify-between items-end">
            <h1 id="video-title" class="text-2xl font-bold text-blue-400 truncate w-3/4">Loading...</h1>
            <div class="flex items-center gap-3">
                <button id="copy-url-btn" class="hidden text-gray-400 hover:text-white transition-colors"
                    title="Copy Shared Link">
                    <i data-lucide="link" class="w-4 h-4"></i>
                </button>
                <p id="post-id-display" class="text-gray-500 text-sm font-mono"></p>
            </div>
        </div>

        <div class="player-wrapper relative group bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-800 aspect-video"
            id="video-container">
            <video id="video" class="w-full h-full object-contain" crossorigin="anonymous"></video>

            <!-- The independent subtitle layer! -->
            <div id="custom-subtitle-container"
                class="absolute left-0 right-0 w-full text-center pointer-events-none z-[15]"></div>

            <div id="skip-overlay-left" class="click-overlay cursor-pointer">
                <div class="skip-feedback"><i data-lucide="rewind" class="w-12 h-12"></i></div>
            </div>
            <div id="middle-click-overlay" class="click-overlay cursor-pointer"></div>
            <div id="skip-overlay-right" class="click-overlay cursor-pointer">
                <div class="skip-feedback"><i data-lucide="fast-forward" class="w-12 h-12"></i></div>
            </div>

            <div id="loader"
                class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 z-10 pointer-events-none">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                <p id="loader-message" class="mt-4 text-gray-300">Fetching API...</p>
            </div>

            <div id="error-display"
                class="hidden absolute inset-0 flex-col items-center justify-center bg-black/90 z-20 text-center p-6">
                <i data-lucide="alert-triangle" class="w-12 h-12 text-red-500 mb-2"></i>
                <h3 class="text-lg font-bold text-white">Playback Error</h3>
                <p id="error-message" class="text-gray-400 text-sm mt-1">Unable to load stream.</p>
                <button onclick="location.reload()"
                    class="mt-4 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm">Retry</button>
            </div>

            <div class="controls-overlay absolute bottom-0 left-0 right-0 p-4 opacity-0 flex flex-col gap-2 z-20">
                <div class="relative w-full h-2 group/progress cursor-pointer flex items-center"
                    id="progress-container">
                    <div class="absolute w-full h-1 bg-gray-600 rounded-full"></div>
                    <div id="buffered-bar" class="absolute h-1 bg-gray-400 rounded-full transition-all duration-200"
                        style="width: 0%"></div>
                    <div id="progress-bar" class="absolute h-1 bg-blue-500 rounded-full transition-all duration-75"
                        style="width: 0%"></div>
                    <div class="absolute h-3 w-3 bg-white rounded-full shadow opacity-0 group-hover/progress:opacity-100 transition-opacity"
                        id="progress-thumb" style="left: 0%"></div>
                </div>

                <div class="flex items-center justify-between mt-1">
                    <div class="flex items-center gap-4">
                        <button id="play-btn" class="hover:text-blue-400 transition-colors"><i data-lucide="play"
                                class="w-6 h-6 fill-current"></i></button>
                        <div class="group/vol flex items-center gap-2">
                            <button id="mute-btn" class="hover:text-blue-400 transition-colors"><i
                                    data-lucide="volume-2" class="w-6 h-6"></i></button>
                            <div class="w-0 overflow-hidden group-hover/vol:w-24 transition-all duration-300">
                                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1"
                                    class="w-20 h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                            </div>
                        </div>
                        <div class="text-xs text-gray-300 font-mono"><span id="current-time">00:00</span> / <span
                                id="duration">00:00</span></div>
                    </div>

                    <div class="flex items-center gap-3">
                        <button id="rotate-ccw-btn" class="hover:text-blue-400 transition-colors"><i
                                data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
                        <button id="rotate-cw-btn" class="hover:text-blue-400 transition-colors"><i
                                data-lucide="rotate-cw" class="w-5 h-5"></i></button>

                        <div class="relative">
                            <button id="cc-btn"
                                class="flex items-center gap-1 text-sm font-medium transition-colors px-2 py-1 rounded bg-black/40 border border-transparent hover:border-gray-700 opacity-50 cursor-not-allowed"
                                disabled title="No subtitles found">
                                <i data-lucide="subtitles" class="w-4 h-4"></i>
                            </button>
                            <div id="cc-menu"
                                class="hidden absolute bottom-full right-0 mb-2 w-32 bg-gray-900 border border-gray-700 rounded-lg shadow-xl overflow-hidden z-30">
                                <div class="py-1" id="cc-options">
                                    <button
                                        class="w-full text-left px-4 py-2 text-sm hover:bg-gray-800 text-blue-400 bg-blue-900/50 cc-option-btn"
                                        onclick="setSubtitle(-1)">Off</button>
                                </div>
                            </div>
                        </div>

                        <div class="relative">
                            <button id="quality-btn"
                                class="flex items-center gap-1 text-sm font-medium hover:text-blue-400 transition-colors px-2 py-1 rounded bg-black/40 border border-transparent hover:border-gray-700">
                                <i data-lucide="settings" class="w-4 h-4"></i><span
                                    id="current-quality-label">Auto</span>
                            </button>
                            <div id="quality-menu"
                                class="hidden absolute bottom-full right-0 mb-2 w-32 bg-gray-900 border border-gray-700 rounded-lg shadow-xl overflow-hidden z-30">
                                <div class="py-1" id="quality-options"></div>
                            </div>
                        </div>

                        <button id="fullscreen-btn" class="hover:text-blue-400 transition-colors"><i
                                data-lucide="maximize" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6 flex justify-between items-start gap-4">
            <div id="status-badge"
                class="px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-gray-400 border border-gray-700 self-center">
                Initializing...</div>
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 flex-grow">
                <h3 class="font-bold text-gray-300 text-sm mb-2">Debug Info</h3>
                <div class="grid grid-cols-2 gap-4 text-xs font-mono text-gray-400">
                    <div>Status: <span id="debug-status" class="text-white">-</span></div>
                    <div>Current Level: <span id="debug-level" class="text-white">-</span></div>
                    <div>Buffer Length: <span id="debug-buffer" class="text-white">-</span></div>
                    <div>Codecs: <span id="debug-codecs" class="text-white">-</span></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

    <script>
        lucide.createIcons();

        // --- AUTH & SETUP ---
        const token = localStorage.getItem('fromm_access_token');
        if (!token) window.location.replace('index.html');

        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('channel_id');
        const postId = urlParams.get('post_id');

        if (!channelId || !postId) window.location.replace('channels.html');

        document.getElementById('back-to-videos').href = `videos.html?channel_id=${channelId}`;
        document.getElementById('post-id-display').textContent = `ID: ${postId}`;

        // --- SESSION TIMER ---
        function startSessionTimer() {
            const expiryStr = localStorage.getItem('fromm_token_expiry');
            if (!expiryStr) return;

            const expiryTimestamp = parseInt(expiryStr, 10);
            const timerContainer = document.getElementById('session-timer');
            const timeSpan = document.getElementById('time-remaining');

            timerContainer.classList.remove('hidden');

            function updateTimer() {
                const now = Math.floor(Date.now() / 1000);
                const diff = expiryTimestamp - now;

                if (diff <= 0) {
                    timeSpan.textContent = "Expired";
                    timeSpan.className = "text-red-500 font-bold";
                    timerContainer.classList.add('border-red-500', 'bg-red-900/20');
                    clearInterval(timerInterval);
                    return;
                }

                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;

                if (hours > 0) {
                    timeSpan.textContent = `${hours}h ${minutes}m`;
                } else {
                    timeSpan.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            }

            updateTimer();
            const timerInterval = setInterval(updateTimer, 1000);
        }

        startSessionTimer();

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('fromm_access_token');
            localStorage.removeItem('fromm_refresh_token');
            localStorage.removeItem('fromm_resource_token');
            localStorage.removeItem('fromm_token_expiry');
            localStorage.removeItem('fromm_device_id');
            window.location.replace('index.html');
        });

        // --- DOM Elements ---
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const loaderMessage = document.getElementById('loader-message');
        const errorDisplay = document.getElementById('error-display');
        const errorMessage = document.getElementById('error-message');
        const statusBadge = document.getElementById('status-badge');
        const debugStatus = document.getElementById('debug-status');
        const debugCodecs = document.getElementById('debug-codecs');

        let hls = null;
        window.cloudFrontParams = "";

        // --- THE MAGIC: XHR INTERCEPTOR ---
        const originalOpen = XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function (method, url) {
            if (typeof url === 'string' && url.includes('channel-contents.frommyarti.com') && window.cloudFrontParams) {
                if (!url.includes('Signature=')) {
                    const separator = url.includes('?') ? '&' : '?';
                    url = url + separator + window.cloudFrontParams;
                }
            }
            return originalOpen.apply(this, arguments);
        };

        // --- PROGRESS TRACKING ---
        function saveProgress() {
            if (video.currentTime > 0 && video.duration > 0) {
                const progress = {
                    currentTime: video.currentTime,
                    duration: video.duration
                };
                localStorage.setItem(`fromm_progress_${postId}`, JSON.stringify(progress));
            }
        }

        video.addEventListener('pause', saveProgress);

        setInterval(() => {
            if (!video.paused) saveProgress();
        }, 20000);

        video.addEventListener('loadedmetadata', () => {
            const saved = localStorage.getItem(`fromm_progress_${postId}`);
            if (saved) {
                try {
                    const { currentTime, duration } = JSON.parse(saved);
                    if (currentTime > 0 && currentTime < (duration * 0.98)) {
                        video.currentTime = currentTime;
                        updateStatus(`Resumed at ${formatTime(currentTime)}`);
                    }
                } catch (e) { }
            }
        });

        // --- SUBTITLE SCANNER (JSON MANIFEST VERSION) ---
        async function loadSubtitles() {
            const ccBtn = document.getElementById('cc-btn');
            const ccOptions = document.getElementById('cc-options');
            const languageNames = new Intl.DisplayNames(['en'], { type: 'language' });

            try {
                const res = await fetch('assets/subs_manifest.json');
                if (!res.ok) return; // File missing is OK!

                const manifest = await res.json();
                const availableLangs = manifest[postId];

                if (!availableLangs || availableLangs.length === 0) return;

                let trackIndex = 0;

                for (const code of availableLangs) {
                    const subUrl = `assets/subs/${postId}/fromm_${postId}.${code}.vtt`;
                    const label = languageNames.of(code) || code;

                    const track = document.createElement('track');
                    track.kind = 'subtitles';
                    track.label = label;
                    track.srclang = code;
                    track.src = subUrl;
                    video.appendChild(track);

                    const btn = document.createElement('button');
                    btn.className = 'w-full text-left px-4 py-2 text-sm hover:bg-gray-800 transition-colors cc-option-btn';
                    btn.innerHTML = label;

                    const currentIndex = trackIndex;
                    btn.onclick = () => setSubtitle(currentIndex);
                    ccOptions.appendChild(btn);

                    trackIndex++;
                }

                if (trackIndex > 0) {
                    ccBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    ccBtn.classList.add('hover:text-blue-400');
                    ccBtn.disabled = false;
                    ccBtn.title = "Subtitles/CC";
                }
            } catch (e) {
                console.log("Could not load subtitle manifest, playing without subtitles.");
            }
        }

        // --- SUBTITLE CONTROLS ---
        function setSubtitle(index) {
            const tracks = video.textTracks;
            const subContainer = document.getElementById('custom-subtitle-container');

            for (let i = 0; i < tracks.length; i++) {
                tracks[i].mode = 'hidden';
                tracks[i].oncuechange = null;
            }
            subContainer.innerHTML = '';

            if (index >= 0 && tracks[index]) {
                tracks[index].mode = 'hidden';

                tracks[index].oncuechange = (e) => {
                    const activeCues = e.target.activeCues;
                    if (activeCues && activeCues.length > 0) {
                        const cuesArray = Array.from(activeCues);
                        const text = cuesArray.map(c => c.text.replace(/\n/g, '<br>')).join('<br>');
                        subContainer.innerHTML = `<span class="custom-cue">${text}</span>`;
                    } else {
                        subContainer.innerHTML = '';
                    }
                };
            }

            const buttons = document.querySelectorAll('.cc-option-btn');
            buttons.forEach((btn, i) => {
                if (i === index + 1) {
                    btn.classList.add('text-blue-400', 'bg-blue-900/50');
                } else {
                    btn.classList.remove('text-blue-400', 'bg-blue-900/50');
                }
            });

            const ccBtn = document.getElementById('cc-btn');
            if (index >= 0) {
                ccBtn.classList.add('text-blue-400');
            } else {
                ccBtn.classList.remove('text-blue-400');
            }

            document.getElementById('cc-menu').classList.add('hidden');
        }

        document.getElementById('cc-btn').addEventListener('click', e => {
            e.stopPropagation();
            document.getElementById('cc-menu').classList.toggle('hidden');
            document.getElementById('quality-menu').classList.add('hidden');
        });

        document.addEventListener('click', () => {
            document.getElementById('cc-menu').classList.add('hidden');
            document.getElementById('quality-menu').classList.add('hidden');
        });

        // --- MAIN LOGIC ---
        async function main() {
            try {
                updateStatus('Fetching video info...');

                loadSubtitles();

                const response = await fetch(`https://channel-api.frommyarti.com/media/posts/${postId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': token,
                        'uuid': crypto.randomUUID(),
                        'channel-id': channelId,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("Could not fetch video info.");
                const postData = await response.json();

                if (postData.success && postData.data && postData.data.post) {
                    const rawUrl = postData.data.post.url;
                    document.getElementById('video-title').textContent = postData.data.post.title;

                    // NEW: Setup Shared URL copy button if available
                    if (postData.data.post.sharedUrl) {
                        const copyBtn = document.getElementById('copy-url-btn');
                        copyBtn.classList.remove('hidden');
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(postData.data.post.sharedUrl);
                            copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-400"></i>';
                            lucide.createIcons();
                            setTimeout(() => {
                                copyBtn.innerHTML = '<i data-lucide="link" class="w-4 h-4"></i>';
                                lucide.createIcons();
                            }, 2000);
                        };
                    }

                    loaderMessage.textContent = 'Decrypting Stream URL...';

                    const pattern = /CloudFront-Key-Pair-Id=([^&]+)&CloudFront-Signature=([^&]+)&CloudFront-Policy=([^&]+)/;
                    const match = rawUrl.match(pattern);

                    if (!match) throw new Error("No video credentials found in URL.");

                    window.cloudFrontParams = `Key-Pair-Id=${match[1]}&Signature=${match[2]}&Policy=${match[3]}`;

                    // NEW: Smart Stream Logic based on Video Type
                    let streamUrl = rawUrl; // Default: Directly use the stream URL

                    if (postData.data.post.type === "live_record") {
                        // Live VODs have a master playlist that we need to rebuild
                        let masterUrl = rawUrl.split('?')[0];
                        const m3u8Match = masterUrl.match(/\S+\.m3u8/);
                        if (m3u8Match) {
                            const baseSplit = m3u8Match[0].split("_");
                            if (baseSplit.length > 1) {
                                const lastPart = baseSplit.pop();
                                const extension = lastPart.split(".").pop();
                                masterUrl = baseSplit.join("_") + "." + extension;
                            }
                        }
                        streamUrl = masterUrl + '?' + window.cloudFrontParams;
                    }

                    updateStatus('Initializing player...');
                    loaderMessage.textContent = 'Loading Stream...';

                    initPlayer(streamUrl);
                } else {
                    throw new Error("Invalid post data returned.");
                }
            } catch (error) {
                console.error(error);
                showError(error.message);
            }
        }

        function initPlayer(streamUrl) {
            if (Hls.isSupported()) {
                hls = new Hls({
                    debug: false,
                    maxBufferLength: 300,
                    maxMaxBufferLength: 300,
                    maxBufferSize: 150 * 1000 * 1000
                });

                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                    updateStatus('Ready to Play');
                    loader.style.display = 'none';
                    debugCodecs.textContent = data.levels[0]?.attrs?.CODECS || 'Unknown';
                    generateQualityControls(data.levels);
                    video.play().catch(() => updateStatus('Click to Play'));
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        showError(`HLS Error: ${data.details}`);
                        hls.destroy();
                    }
                });
            } else {
                showError("Your browser does not support HLS playback.");
            }
        }

        // --- UTILS & CONTROLS ---
        function updateStatus(msg) {
            statusBadge.textContent = msg;
            debugStatus.textContent = msg;
            statusBadge.className = 'px-3 py-1 rounded-full text-xs font-medium border self-center ' +
                (msg.includes('Playing') ? 'bg-green-900 text-green-300 border-green-700' :
                    (msg.includes('Error') ? 'bg-red-900 text-red-300 border-red-700' :
                        'bg-gray-800 text-gray-400 border-gray-700'));
        }

        function showError(msg) {
            loader.style.display = 'none';
            errorDisplay.classList.remove('hidden');
            errorDisplay.classList.add('flex');
            errorMessage.textContent = msg;
            updateStatus(`Error`);
        }

        const playBtn = document.getElementById('play-btn');
        const muteBtn = document.getElementById('mute-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressThumb = document.getElementById('progress-thumb');
        const bufferedBar = document.getElementById('buffered-bar');
        const debugBuffer = document.getElementById('debug-buffer');

        // --- PLAYBACK CONTROLS ---
        playBtn.addEventListener('click', () => video.paused ? video.play() : video.pause());

        video.addEventListener('play', () => {
            playBtn.innerHTML = '<i data-lucide="pause" class="w-6 h-6 fill-current"></i>';
            lucide.createIcons();
            updateStatus('Playing');
        });

        video.addEventListener('pause', () => {
            playBtn.innerHTML = '<i data-lucide="play" class="w-6 h-6 fill-current"></i>';
            lucide.createIcons();
            updateStatus('Paused');
        });

        // --- VOLUME ---
        muteBtn.addEventListener('click', () => { video.muted = !video.muted; });
        volumeSlider.addEventListener('input', e => { video.muted = false; video.volume = e.target.value; });
        video.addEventListener('volumechange', () => {
            volumeSlider.value = video.muted ? 0 : video.volume;
            let icon = 'volume-x';
            if (!video.muted) {
                if (video.volume > 0.5) icon = 'volume-2';
                else if (video.volume > 0) icon = 'volume-1';
            }
            muteBtn.innerHTML = `<i data-lucide="${icon}" class="w-6 h-6"></i>`;
            lucide.createIcons();
        });

        // --- SEEKING & DRAGGING ---
        let isDragging = false;

        function handleSeek(e) {
            if (!video.duration) return;
            const rect = progressContainer.getBoundingClientRect();
            let pos = (e.clientX - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            const seekTime = pos * video.duration;
            video.currentTime = seekTime;

            progressBar.style.width = `${pos * 100}%`;
            progressThumb.style.left = `${pos * 100}%`;
            currentTimeEl.textContent = formatTime(seekTime);
        }

        progressContainer.addEventListener('mousedown', e => { isDragging = true; handleSeek(e); });
        document.addEventListener('mousemove', e => { if (isDragging) handleSeek(e); });
        document.addEventListener('mouseup', () => { isDragging = false; });

        // --- TIME & BUFFER UPDATES ---
        video.addEventListener('timeupdate', () => {
            if (isDragging) return;

            const progress = (video.currentTime / video.duration) * 100;
            progressBar.style.width = `${progress}%`;
            progressThumb.style.left = `${progress}%`;
            currentTimeEl.textContent = formatTime(video.currentTime);
            if (video.duration) durationEl.textContent = formatTime(video.duration);

            updateBuffer();
        });

        function updateBuffer() {
            if (!video.duration || !video.buffered || !video.buffered.length) {
                debugBuffer.textContent = '0.00s';
                return;
            }
            let bufferedEnd = video.currentTime;
            for (let i = 0; i < video.buffered.length; i++) {
                if (video.buffered.start(i) <= video.currentTime && video.buffered.end(i) >= video.currentTime) {
                    bufferedEnd = video.buffered.end(i);
                    const percentage = (bufferedEnd / video.duration) * 100;
                    bufferedBar.style.width = `${percentage}%`;
                    break;
                }
            }
            debugBuffer.textContent = (bufferedEnd - video.currentTime).toFixed(2) + 's';
        }

        function formatTime(time) {
            if (isNaN(time)) return "00:00";
            const min = Math.floor(time / 60), sec = Math.floor(time % 60);
            return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        // --- QUALITY CONTROLS ---
        function generateQualityControls(levels) {
            const qualityOptions = document.getElementById('quality-options');
            qualityOptions.innerHTML = '';

            const autoBtn = document.createElement('button');
            autoBtn.className = 'w-full text-left px-4 py-2 text-sm hover:bg-gray-800 text-blue-400 bg-blue-900/50';
            autoBtn.innerHTML = 'Auto';
            autoBtn.onclick = () => {
                hls.currentLevel = -1;
                document.getElementById('current-quality-label').textContent = 'Auto';
                document.getElementById('quality-menu').classList.add('hidden');
            };
            qualityOptions.appendChild(autoBtn);

            levels.forEach((level, index) => {
                const btn = document.createElement('button');
                const res = Math.min(level.width, level.height);
                btn.className = 'w-full text-left px-4 py-2 text-sm hover:bg-gray-800';
                btn.innerHTML = `${res}p`;
                btn.onclick = () => {
                    hls.currentLevel = index;
                    document.getElementById('current-quality-label').textContent = `${res}p`;
                    document.getElementById('quality-menu').classList.add('hidden');
                };
                qualityOptions.appendChild(btn);
            });
        }

        document.getElementById('quality-btn').addEventListener('click', e => {
            e.stopPropagation();
            document.getElementById('quality-menu').classList.toggle('hidden');
            document.getElementById('cc-menu').classList.add('hidden');
        });

        // --- ROTATION & FULLSCREEN ---
        let currentRot = 0;
        const playerWrapper = document.getElementById('video-container');

        function updateRotation() {
            const video = document.getElementById('video');
            if (currentRot === 90 || currentRot === 270) {
                const scale = playerWrapper.clientWidth / playerWrapper.clientHeight;
                video.style.transform = `rotate(${currentRot}deg) scale(${scale})`;
            } else {
                video.style.transform = `rotate(${currentRot}deg) scale(1)`;
            }
        }

        document.getElementById('rotate-cw-btn').addEventListener('click', () => {
            currentRot = (currentRot + 90) % 360;
            updateRotation();
        });

        document.getElementById('rotate-ccw-btn').addEventListener('click', () => {
            currentRot = (currentRot - 90 + 360) % 360;
            updateRotation();
        });

        window.addEventListener('resize', updateRotation);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen().catch(err => console.error(err));
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);


        // --- SKIPPING & OVERLAY CLICKS (YOUTUBE HYBRID EXPERIENCE) ---
        function skip(duration) {
            if (!video.duration) return;
            video.currentTime += duration;
            const overlay = duration > 0 ? document.getElementById('skip-overlay-right') : document.getElementById('skip-overlay-left');
            overlay.classList.remove('show-skip-feedback');
            void overlay.offsetWidth;
            overlay.classList.add('show-skip-feedback');
            setTimeout(() => overlay.classList.remove('show-skip-feedback'), 500);
        }

        // Left & Right Edges: Dedicated solely to double-click skipping.
        document.getElementById('skip-overlay-left').addEventListener('dblclick', () => skip(-10));
        document.getElementById('skip-overlay-right').addEventListener('dblclick', () => skip(10));

        // Center Area: Instant Play/Pause, Double-Click Fullscreen
        document.getElementById('middle-click-overlay').addEventListener('click', () => {
            video.paused ? video.play() : video.pause();
        });
        document.getElementById('middle-click-overlay').addEventListener('dblclick', toggleFullscreen);

        // Keyboard Shortcuts (Standard Desktop YouTube configuration)
        document.addEventListener('keydown', e => {
            if (document.activeElement.tagName === 'INPUT') return;

            switch (e.key.toLowerCase()) {
                case 'arrowleft':
                case 'j':
                    e.preventDefault(); skip(-10); break;
                case 'arrowright':
                case 'l':
                    e.preventDefault(); skip(10); break;
                case ' ':
                case 'k':
                    e.preventDefault(); video.paused ? video.play() : video.pause(); break;
                case 'f':
                    e.preventDefault(); toggleFullscreen(); break;
                case 'm':
                    e.preventDefault();
                    video.muted = !video.muted;
                    document.getElementById('volume-slider').value = video.muted ? 0 : video.volume;
                    break;
            }
        });


        // --- IDLE MOUSE TRACKER (Hides UI after 2.5s) ---
        let idleTimeout;

        function resetIdleTimer() {
            playerWrapper.classList.remove('idle');
            clearTimeout(idleTimeout);
            // Only hide controls automatically if the video is actually playing
            if (!video.paused) {
                idleTimeout = setTimeout(() => {
                    playerWrapper.classList.add('idle');
                }, 2500);
            }
        }

        playerWrapper.addEventListener('mousemove', resetIdleTimer);
        playerWrapper.addEventListener('mouseleave', () => {
            if (!video.paused) playerWrapper.classList.add('idle');
        });

        video.addEventListener('play', resetIdleTimer);
        video.addEventListener('pause', () => {
            playerWrapper.classList.remove('idle');
            clearTimeout(idleTimeout);
        });

        // Start
        main();
    </script>
</body>

</html>
