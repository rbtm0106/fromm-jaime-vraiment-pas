<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* --- VIDEO CONTAINER --- */
        .video-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: black;
            overflow: hidden; 
            container-type: size;
            container-name: player;
        }

        .video-container.theater,
        .video-container.full-screen {
            max-width: initial;
            width: 100%;
        }

        .video-container.full-screen,
        .video-container:fullscreen {
            max-height: 100vh;
            border: none !important;
            border-radius: 0 !important;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease-in-out;
        }

        /* --- UI VISIBILITY LOGIC (Hides completely when idle, even on pause) --- */
        .video-container.idle {
            cursor: none !important;
        }
        
        .video-container.idle .video-controls-container,
        .video-container.idle .center-play-overlay {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Mobile: UI is hidden by default unless mobile-ui-active is present */
        .video-container.touch-device:not(.mobile-ui-active) .video-controls-container,
        .video-container.touch-device:not(.mobile-ui-active) .center-play-overlay {
            opacity: 0;
            pointer-events: none;
        }

        /* --- CONTROLS CONTAINER --- */
        .video-controls-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            color: white;
            z-index: 100;
            opacity: 0;
            transition: opacity 150ms ease-in-out;
        }

        .video-controls-container::before {
            content: "";
            position: absolute;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .85), transparent);
            width: 100%;
            aspect-ratio: 6 / 1;
            z-index: -1;
            pointer-events: none;
        }

        /* PC hover reveals controls ONLY if not idle */
        .video-container:not(.touch-device):not(.idle):hover .video-controls-container,
        .video-container:not(.idle):focus-within .video-controls-container,
        .video-container.mobile-ui-active:not(.idle) .video-controls-container {
            opacity: 1;
            pointer-events: auto;
        }

        .video-controls-container .controls {
            display: flex;
            gap: .5rem;
            padding: .5rem;
            align-items: center;
        }

        .video-controls-container .controls button {
            background: none;
            border: none;
            color: inherit;
            padding: 0;
            height: 2rem; 
            width: 2rem;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: .85;
            transition: opacity 150ms ease-in-out, transform 150ms ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-controls-container .controls button:hover {
            opacity: 1;
        }

        /* Toggle Icons Display */
        .video-container.paused .pause-icon { display: none; }
        .video-container:not(.paused) .play-icon { display: none; }
        
        .video-container.full-screen .maximize-icon { display: none; }
        .video-container:not(.full-screen) .minimize-icon { display: none; }

        .volume-high-icon, .volume-low-icon, .volume-muted-icon { display: none; }
        .video-container[data-volume-level="high"] .volume-high-icon { display: block; }
        .video-container[data-volume-level="low"] .volume-low-icon { display: block; }
        .video-container[data-volume-level="muted"] .volume-muted-icon { display: block; }

        .video-container.captions-on .cc-icon { color: #60A5FA; }

        /* --- MOBILE CENTER PLAY BUTTON --- */
        .center-play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 150ms ease-in-out;
            background: rgba(0,0,0,0.3);
        }
        
        .video-container.touch-device.mobile-ui-active:not(.idle) .center-play-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .center-play-overlay button {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* --- VOLUME --- */
        .volume-container {
            display: flex;
            align-items: center;
        }

        .volume-slider {
            width: 0;
            transform-origin: left;
            transform: scaleX(0);
            transition: width 150ms ease-in-out, transform 150ms ease-in-out;
            -webkit-appearance: none;
            background: #4b5563;
            height: 4px;
            border-radius: 4px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
        }

        .video-container:not(.touch-device) .volume-container:hover .volume-slider,
        .volume-slider:focus-within,
        .video-container.touch-device .volume-slider { 
            width: 80px;
            transform: scaleX(1);
            margin-left: 8px;
        }

        .duration-container {
            display: flex;
            align-items: center;
            gap: .25rem;
            flex-grow: 1;
            font-family: monospace;
            font-size: 0.85rem;
            color: #d1d5db;
        }

        /* --- TIMELINE --- */
        .timeline-container {
            height: 7px;
            margin-inline: .5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        
        .video-container.touch-device .timeline-container {
            height: 12px; 
        }

        .timeline {
            background-color: rgba(100, 100, 100, .5);
            height: 3px;
            width: 100%;
            position: relative;
            transition: height 150ms ease-in-out;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            right: calc(100% - var(--preview-position) * 100%);
            background-color: rgb(150, 150, 150);
            display: none;
        }

        .timeline::after {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            right: calc(100% - var(--progress-position) * 100%);
            background-color: red;
        }

        .timeline .buffer-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.4);
            width: calc(var(--buffer-position) * 100%);
            z-index: -1;
        }

        .timeline .thumb-indicator {
            --scale: 0;
            position: absolute;
            transform: translateX(-50%) scale(var(--scale));
            height: 200%;
            top: -50%;
            left: calc(var(--progress-position) * 100%);
            background-color: red;
            border-radius: 50%;
            transition: transform 150ms ease-in-out;
            aspect-ratio: 1 / 1;
            z-index: 2;
        }

        .video-container.touch-device .thumb-indicator {
            --scale: 1.2; 
        }

        /* --- TIMELINE TOOLTIP --- */
        .timeline-tooltip {
            position: absolute;
            top: -30px;
            left: calc(var(--preview-position) * 100%);
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            opacity: 0;
            transition: opacity 150ms ease-in-out;
            white-space: nowrap;
            z-index: 3;
        }

        .video-container.scrubbing .timeline-tooltip,
        .timeline-container:hover .timeline-tooltip {
            opacity: 1;
        }

        .video-container.scrubbing .timeline::before,
        .timeline-container:hover .timeline::before {
            display: block;
        }

        .video-container.scrubbing .thumb-indicator,
        .timeline-container:hover .thumb-indicator {
            --scale: 1;
        }

        .video-container.scrubbing .timeline,
        .timeline-container:hover .timeline {
            height: 100%;
        }

        /* --- SETTINGS WHEEL MENU --- */
        #settings-menu {
            position: absolute;
            bottom: 60px;
            right: 16px;
            width: 260px;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #374151;
            border-radius: 8px;
            z-index: 150;
            color: white;
            font-size: 0.875rem;
            pointer-events: auto;
        }

        .video-container.touch-device #settings-menu {
            bottom: 70px;
            width: 280px; 
        }

        .settings-section {
            border-bottom: 1px solid #374151;
            padding: 8px;
            max-height: 160px;
            overflow-y: auto;
        }
        
        .video-container.touch-device .settings-section {
            padding: 12px 8px; 
        }
        
        .settings-section:last-child { border-bottom: none; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

       /* --- SUBTITLES OVERLAY --- */
        .custom-cue {
            background: rgba(8, 8, 8, 0.75); 
            color: #ffffff;
            font-family: "YouTube Noto", Roboto, "Arial Unicode Ms", Arial, Helvetica, sans-serif;
            font-size: clamp(0.8rem, 4cqmin, 2.2rem); 
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.5); 
            border-radius: 2px;
            padding: 0.25em 0.5em; 
            display: inline-block;
            line-height: 1.3;
        }

        #custom-subtitle-container {
            position: absolute;
            bottom: 10cqh; 
            left: 0;
            right: 0;
            width: 100%;
            pointer-events: none;
            z-index: 50;
            text-align: center;
            transition: transform 0.2s ease-in-out;
        }

        /* Lifts the subtitles up dynamically when the control bar appears */
        .video-container:not(.touch-device):not(.idle):hover #custom-subtitle-container,
        .video-container:not(.idle):focus-within #custom-subtitle-container,
        .video-container.paused #custom-subtitle-container,
        .video-container.mobile-ui-active:not(.idle) #custom-subtitle-container {
            transform: translateY(-3.5rem); 
        }
    </style>
</head>

<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-2 sm:p-4 font-sans">

    <nav class="w-full max-w-5xl mb-4 p-3 sm:p-4 bg-gray-800 rounded-lg flex justify-between items-center shadow border border-gray-700">
        <div class="flex gap-3 sm:gap-4 text-sm sm:text-base">
            <a href="channels.html" class="text-blue-400 hover:text-blue-300 transition-colors" data-i18n="nav_channels">Channels</a>
            <a href="#" id="back-to-videos" class="text-blue-400 hover:text-blue-300 transition-colors" data-i18n="nav_videos">Videos</a>
        </div>
        <div class="flex gap-2 sm:gap-4 items-center">
            <div class="flex gap-2 items-center mr-2 border-r border-gray-700 pr-3">
                <select class="lang-selector bg-gray-800 text-gray-300 text-xs sm:text-sm border border-gray-600 rounded-md focus:outline-none focus:border-blue-400 py-1 px-2 cursor-pointer transition-colors hover:bg-gray-700">
                    <option value="ko">🇰🇷 한국어</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="hanyang">☘️ 하냥어</option>

                </select>
            </div>
            <div id="session-timer" class="hidden flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1 bg-gray-900 border border-gray-700 rounded-full text-[10px] sm:text-xs font-mono text-gray-400 shadow-inner">
                <i data-lucide="clock" class="w-3 h-3"></i>
                <span id="time-remaining">--:--</span>
            </div>
            <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1 text-sm sm:text-base">
                <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline" data-i18n="nav_logout">Logout</span>
            </button>
        </div>
    </nav>

    <main class="w-full max-w-5xl">
        <div class="mb-2 sm:mb-4 flex justify-between items-end gap-2">
            <h1 id="video-title" class="text-lg sm:text-2xl font-bold text-blue-400 truncate w-[70%]"></h1>
            <div class="flex items-center gap-2 sm:gap-3 shrink-0">
                <button id="copy-url-btn" class="hidden text-gray-400 hover:text-white transition-colors p-1" title="Copy Shared Link">
                    <i data-lucide="link" class="w-4 h-4"></i>
                </button>
                <p id="post-id-display" class="text-gray-500 text-xs sm:text-sm font-mono shrink-0"></p>
            </div>
        </div>

        <div class="video-container paused shadow-2xl rounded-xl border border-gray-800 aspect-video" data-volume-level="high" id="video-wrapper">
            <video id="video" crossorigin="anonymous" playsinline></video>

            <div id="custom-subtitle-container"></div>

            <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 z-10 pointer-events-none">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500"></div>
                <p id="loader-message" class="mt-4 text-sm text-gray-300" data-i18n="status_fetching_api">Fetching API...</p>
            </div>
            
            <div class="center-play-overlay">
                <button class="center-play-btn">
                    <i data-lucide="play" class="play-icon w-8 h-8 fill-current"></i>
                    <i data-lucide="pause" class="pause-icon w-8 h-8 fill-current"></i>
                </button>
            </div>

            <div id="settings-menu" class="hidden no-scrollbar">
                <div class="settings-section flex justify-between items-center">
                    <span class="text-gray-300 flex items-center gap-2"><i data-lucide="rotate-cw" class="w-4 h-4"></i> <span data-i18n="settings_rotation">Rotation</span></span>
                    <div class="flex gap-2">
                        <button id="wheel-rotate-ccw" class="p-1 bg-gray-800 rounded hover:bg-gray-700 hover:text-blue-400"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                        <button id="wheel-rotate-cw" class="p-1 bg-gray-800 rounded hover:bg-gray-700 hover:text-blue-400"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="text-xs text-gray-500 font-bold uppercase mb-1" data-i18n="settings_subtitles">Subtitles</div>
                    <div id="wheel-cc-options" class="flex flex-col gap-1">
                        <button class="w-full text-left px-2 py-1.5 rounded hover:bg-gray-800 text-blue-400 bg-blue-900/30 wheel-cc-btn" data-index="-1" data-i18n="settings_off">Off</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="text-xs text-gray-500 font-bold uppercase mb-1" data-i18n="settings_quality">Quality</div>
                    <div id="wheel-quality-options" class="flex flex-col gap-1"></div>
                </div>
            </div>

            <div class="video-controls-container">
                <div class="timeline-container">
                    <div class="timeline" style="--progress-position: 0; --preview-position: 0; --buffer-position: 0;">
                        <div class="buffer-bar"></div>
                        <div class="thumb-indicator"></div>
                        <div class="timeline-tooltip">00:00</div>
                    </div>
                </div>
                
                <div class="controls">
                    <button class="play-pause-btn hidden sm:flex">
                        <i data-lucide="play" class="play-icon w-6 h-6 fill-current"></i>
                        <i data-lucide="pause" class="pause-icon w-6 h-6 fill-current"></i>
                    </button>

                    <div class="volume-container hidden sm:flex">
                        <button class="mute-btn">
                            <i data-lucide="volume-2" class="volume-high-icon w-5 h-5"></i>
                            <i data-lucide="volume-1" class="volume-low-icon w-5 h-5"></i>
                            <i data-lucide="volume-x" class="volume-muted-icon w-5 h-5"></i>
                        </button>
                        <input class="volume-slider" type="range" min="0" max="1" step="any" value="1">
                    </div>

                    <div class="duration-container ml-2 sm:ml-0">
                        <span class="current-time">00:00</span> / <span class="total-time">00:00</span>
                    </div>

                    <button class="captions-btn cc-icon opacity-50 cursor-not-allowed" disabled id="captions-toggle-btn">
                        <i data-lucide="subtitles" class="w-5 h-5"></i>
                    </button>

                    <button class="settings-btn hover:rotate-90 transition-transform">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>

                    <button class="pip-btn hidden" title="Picture-in-Picture">
                        <i data-lucide="picture-in-picture-2" class="w-5 h-5"></i>
                    </button>

                    <button class="full-screen-btn">
                        <i data-lucide="maximize" class="maximize-icon w-5 h-5"></i>
                        <i data-lucide="minimize" class="minimize-icon w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-4 sm:mt-6 flex flex-col sm:flex-row justify-between items-stretch sm:items-start gap-4">
            <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] sm:text-xs font-medium bg-gray-800 text-gray-400 border border-gray-700 self-start sm:self-center" data-i18n="status_initializing">Initializing...</div>
            <div class="bg-gray-800 p-3 sm:p-4 rounded-lg border border-gray-700 flex-grow w-full">
                <h3 class="font-bold text-gray-300 text-xs sm:text-sm mb-2" data-i18n="debug_info_title">Debug Info</h3>
                <div class="grid grid-cols-2 gap-2 sm:gap-4 text-[10px] sm:text-xs font-mono text-gray-400">
                    <div class="truncate"><span data-i18n="debug_status_label">Status:</span> <span id="debug-status" class="text-white">-</span></div>
                    <div class="truncate"><span data-i18n="debug_level_label">Level:</span> <span id="debug-level" class="text-white">-</span></div>
                    <div class="truncate"><span data-i18n="debug_buffer_label">Buffer:</span> <span id="debug-buffer" class="text-white">-</span></div>
                    <div class="truncate"><span data-i18n="debug_codecs_label">Codecs:</span> <span id="debug-codecs" class="text-white">-</span></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

    <script>
        lucide.createIcons();

        // --- DEVICE DETECTION ---
        const isTouchDevice = window.matchMedia("(pointer: coarse)").matches || 'ontouchstart' in window;
        const videoContainer = document.querySelector(".video-container");
        if (isTouchDevice) videoContainer.classList.add("touch-device");

        // --- DOM Elements ---
        const video = document.querySelector("video");
        const playPauseBtn = document.querySelector(".play-pause-btn");
        const centerPlayBtn = document.querySelector(".center-play-btn");
        const fullScreenBtn = document.querySelector(".full-screen-btn");
        const pipBtn = document.querySelector(".pip-btn");
        const muteBtn = document.querySelector(".mute-btn");
        const captionsBtn = document.querySelector(".captions-btn");
        const settingsBtn = document.querySelector(".settings-btn");
        const settingsMenu = document.getElementById("settings-menu");
        
        const currentTimeElem = document.querySelector(".current-time");
        const totalTimeElem = document.querySelector(".total-time");
        const volumeSlider = document.querySelector(".volume-slider");
        const timelineContainer = document.querySelector(".timeline-container");
        const timeline = document.querySelector(".timeline");
        
        const loader = document.getElementById('loader');
        const statusBadge = document.getElementById('status-badge');
        const debugStatus = document.getElementById('debug-status');
        const debugCodecs = document.getElementById('debug-codecs');
        const debugBuffer = document.getElementById('debug-buffer');

        let hls = null;
        window.cloudFrontParams = "";
        let availableLanguages = [];
        let currentSubtitleIndex = -1;
        let isScrubbing = false;
        let wasPaused = false;
        let idleTimeout = null;

        if (document.pictureInPictureEnabled) pipBtn.classList.remove('hidden');

        // --- AUTH & URL PARAMS ---
        const token = localStorage.getItem('fromm_access_token');
        if (!token) window.location.replace('index.html');
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('post_id');
        const channelId = urlParams.get('channel_id');
        
        document.getElementById('post-id-display').textContent = `ID: ${postId}`;
        document.getElementById('back-to-videos').href = `videos.html?channel_id=${channelId}`;

        // Initial translation checks for dynamic titles
        window.addEventListener('i18nLoaded', () => {
            document.getElementById('captions-toggle-btn').title = window.t('settings_no_subtitles');
            document.getElementById('video-title').textContent = window.t('status_fetching_info');
        });

        // --- SESSION TIMER ---
function startSessionTimer() {
            const expiryStr = localStorage.getItem('fromm_token_expiry');
            if (!expiryStr) return;

            const expiryTimestamp = parseInt(expiryStr, 10);
            const timerContainer = document.getElementById('session-timer');
            const timeSpan = document.getElementById('time-remaining');

            timerContainer.classList.remove('hidden');

            // Define the variable BEFORE the inner function runs
            let timerInterval;

            function updateTimer() {
                const now = Math.floor(Date.now() / 1000);
                const diff = expiryTimestamp - now;

                // --- AUTOMATIC LOGOUT LOGIC ---
                if (diff <= 0) {
                    if (timerInterval) clearInterval(timerInterval);
                    
                    localStorage.removeItem('fromm_access_token');
                    localStorage.removeItem('fromm_refresh_token');
                    localStorage.removeItem('fromm_resource_token');
                    localStorage.removeItem('fromm_token_expiry');
                    localStorage.removeItem('fromm_device_id');
                    
                    window.location.replace('index.html');
                    return;
                }

                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;

                if (hours > 0) {
                    timeSpan.textContent = `${hours}h ${minutes}m`;
                } else {
                    timeSpan.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }

                if (diff <= 300) {
                    timeSpan.className = "text-yellow-400 font-bold animate-pulse";
                    timerContainer.classList.add('border-yellow-600');
                }
            }

            updateTimer(); 
            timerInterval = setInterval(updateTimer, 1000);
        }
        startSessionTimer();

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('fromm_access_token');
            localStorage.removeItem('fromm_refresh_token');
            localStorage.removeItem('fromm_resource_token');
            localStorage.removeItem('fromm_token_expiry');
            localStorage.removeItem('fromm_device_id');
            window.location.replace('index.html');
        });

        const originalOpen = XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function (method, url) {
            if (typeof url === 'string' && url.includes('channel-contents.frommyarti.com') && window.cloudFrontParams) {
                if (!url.includes('Signature=')) url += (url.includes('?') ? '&' : '?') + window.cloudFrontParams;
            }
            return originalOpen.apply(this, arguments);
        };

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener("keydown", (e) => {
            const tagName = document.activeElement.tagName.toLowerCase();
            if (tagName === "input" || tagName === "textarea") return;
            switch (e.key.toLowerCase()) {
                case " ": if (tagName === "button") return;
                case "k": e.preventDefault(); togglePlayPause(); break;
                case "f": e.preventDefault(); toggleFullScreen(); break;
                case "m": e.preventDefault(); toggleMute(); break;
                case "arrowleft": case "j": e.preventDefault(); skip(-10); break;
                case "arrowright": case "l": e.preventDefault(); skip(10); break;
                case "c": e.preventDefault(); toggleCaptions(); break;
            }
        });

        // --- TIMELINE SCRUBBING ---
        const handleDragMove = (e) => { if (isScrubbing) handleTimelineUpdate(e.touches ? e.touches[0].clientX : e.clientX); };
        const handleDragEnd = (e) => { if (isScrubbing) toggleScrubbing(e, false); };

        timelineContainer.addEventListener("mousedown", (e) => toggleScrubbing(e, true));
        timelineContainer.addEventListener("touchstart", (e) => toggleScrubbing(e, true), {passive: true});
        document.addEventListener("mouseup", handleDragEnd);
        document.addEventListener("touchend", handleDragEnd);
        document.addEventListener("mousemove", handleDragMove);
        document.addEventListener("touchmove", handleDragMove, {passive: false});

        function toggleScrubbing(e, starting) {
            const clientX = e.touches ? e.changedTouches[0].clientX : e.clientX;
            const rect = timelineContainer.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
            
            isScrubbing = starting;
            videoContainer.classList.toggle("scrubbing", isScrubbing);
            
            if (isScrubbing) {
                wasPaused = video.paused;
                video.pause();
            } else {
                video.currentTime = percent * video.duration;
                if (!wasPaused) video.play();
            }
            handleTimelineUpdate(clientX);
        }

        const timelineTooltip = document.querySelector(".timeline-tooltip");

        function handleTimelineUpdate(clientX) {
            const rect = timelineContainer.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
            timeline.style.setProperty("--preview-position", percent);
            if (isScrubbing) timeline.style.setProperty("--progress-position", percent);
            
            if (timelineTooltip && video.duration) {
                timelineTooltip.textContent = formatTime(percent * video.duration);
            }
        }

        // --- TIME UPDATE, DURATION & RESUME LOGIC ---
        video.addEventListener("loadedmetadata", () => { 
            totalTimeElem.textContent = formatTime(video.duration); 
            
            const saved = localStorage.getItem(`fromm_progress_${postId}`);
            if (saved) {
                try {
                    const { currentTime, duration } = JSON.parse(saved);
                    if (currentTime > 0 && currentTime < (duration * 0.98)) {
                        video.currentTime = currentTime;
                        updateStatus(window.t('status_resumed') + ` ${formatTime(currentTime)}`);
                    }
                } catch (e) { }
            }
        });

        function saveProgress() {
            if (video.currentTime > 0 && video.duration > 0) {
                const progress = { currentTime: video.currentTime, duration: video.duration };
                localStorage.setItem(`fromm_progress_${postId}`, JSON.stringify(progress));
            }
        }

        video.addEventListener('pause', saveProgress);
        setInterval(() => { if (!video.paused) saveProgress(); }, 20000);
        
        video.addEventListener("timeupdate", () => {
            currentTimeElem.textContent = formatTime(video.currentTime);
            if (!isScrubbing) timeline.style.setProperty("--progress-position", video.currentTime / video.duration);
            updateBuffer();
        });

        function updateBuffer() {
            if (!video.duration || !video.buffered.length) {
                debugBuffer.textContent = '0.00s';
                return;
            }
            let bufferedEnd = video.currentTime;
            for (let i = 0; i < video.buffered.length; i++) {
                if (video.buffered.start(i) <= video.currentTime && video.buffered.end(i) >= video.currentTime) {
                    bufferedEnd = video.buffered.end(i);
                    break;
                }
            }
            timeline.style.setProperty("--buffer-position", bufferedEnd / video.duration);
            debugBuffer.textContent = (bufferedEnd - video.currentTime).toFixed(2) + 's';
        }

        function formatTime(time) {
            if (isNaN(time)) return "00:00";
            const sec = Math.floor(time % 60), min = Math.floor((time / 60) % 60), hrs = Math.floor(time / 3600);
            return hrs > 0 ? `${hrs}:${min.toString().padStart(2, "0")}:${sec.toString().padStart(2, "0")}` : `${min.toString().padStart(2, "0")}:${sec.toString().padStart(2, "0")}`;
        }

        function skip(seconds) { video.currentTime += seconds; }

        muteBtn.addEventListener("click", toggleMute);
        volumeSlider.addEventListener("input", updateVolume);

        function toggleMute() { video.muted = !video.muted; }
        function updateVolume() { video.volume = volumeSlider.value; video.muted = volumeSlider.value == 0; }

        video.addEventListener("volumechange", () => {
            volumeSlider.value = video.muted ? 0 : video.volume;
            videoContainer.dataset.volumeLevel = video.volume === 0 || video.muted ? "muted" : (video.volume < 0.5 ? "low" : "high");
        });

        let clickTimer = null;

        playPauseBtn.addEventListener("click", (e) => { e.stopPropagation(); togglePlayPause(); });
        centerPlayBtn.addEventListener("click", (e) => { e.stopPropagation(); togglePlayPause(); });
        
        videoContainer.addEventListener("click", (e) => {
            if (e.target.closest('.controls') || e.target.closest('.timeline-container') || e.target.closest('#settings-menu') || e.target.closest('.center-play-btn')) {
                startIdleTimer();
                return;
            }

            settingsMenu.classList.add('hidden');

            if (clickTimer === null) {
                clickTimer = setTimeout(() => {
                    clickTimer = null;
                    if (isTouchDevice) {
                        videoContainer.classList.toggle("mobile-ui-active");
                        startIdleTimer(); 
                    } else togglePlayPause();
                }, 250); 
            } else {
                clearTimeout(clickTimer);
                clickTimer = null;
                
                if (isTouchDevice) {
                    const rect = videoContainer.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    if (clickX < rect.width / 3) skip(-10);
                    else if (clickX > (rect.width * 2) / 3) skip(10);
                    else toggleFullScreen();
                } else {
                    toggleFullScreen();
                }
            }
        });

        function togglePlayPause() { video.paused ? video.play() : video.pause(); }

        video.addEventListener("play", () => {
            videoContainer.classList.remove("paused");
            updateStatus(window.t('status_playing'));
            startIdleTimer();
        });

        video.addEventListener("pause", () => {
            videoContainer.classList.add("paused");
            updateStatus(window.t('status_paused'));
            startIdleTimer();
        });

        function startIdleTimer() {
            clearTimeout(idleTimeout);
            videoContainer.classList.remove("idle");
            
            idleTimeout = setTimeout(() => {
                videoContainer.classList.add("idle");
                videoContainer.classList.remove("mobile-ui-active"); 
                settingsMenu.classList.add("hidden");
            }, 2500);
        }
        
        videoContainer.addEventListener("mousemove", startIdleTimer);
        videoContainer.addEventListener("mouseleave", () => videoContainer.classList.add("idle"));

        fullScreenBtn.addEventListener("click", (e) => { e.stopPropagation(); toggleFullScreen(); });
        pipBtn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            else await video.requestPictureInPicture();
        });

        function toggleFullScreen() {
            if (document.fullscreenElement == null) {
                if (videoContainer.requestFullscreen) videoContainer.requestFullscreen();
                else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen(); 
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        videoContainer.addEventListener("fullscreenchange", () => videoContainer.classList.toggle("full-screen", document.fullscreenElement != null));

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('hidden');
            if (!settingsMenu.classList.contains('hidden')) startIdleTimer();
        });

        let currentRot = 0;
        function updateRotation() {
            const scale = (currentRot === 90 || currentRot === 270) ? videoContainer.clientWidth / videoContainer.clientHeight : 1;
            video.style.transform = `rotate(${currentRot}deg) scale(${scale})`;
        }
        document.getElementById('wheel-rotate-cw').addEventListener('click', (e) => { e.stopPropagation(); currentRot = (currentRot + 90) % 360; updateRotation(); });
        document.getElementById('wheel-rotate-ccw').addEventListener('click', (e) => { e.stopPropagation(); currentRot = (currentRot - 90 + 360) % 360; updateRotation(); });
        window.addEventListener('resize', updateRotation);

        function generateQualityControls(levels) {
            const qualityOptions = document.getElementById('wheel-quality-options');
            qualityOptions.innerHTML = '';
            const createBtn = (label, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-2 py-1.5 rounded hover:bg-gray-800 text-gray-300 wheel-qual-btn';
                btn.innerHTML = label;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    hls.currentLevel = index;
                    document.querySelectorAll('.wheel-qual-btn').forEach(b => {
                        b.classList.replace('text-blue-400', 'text-gray-300'); b.classList.remove('bg-blue-900/30');
                    });
                    btn.classList.replace('text-gray-300', 'text-blue-400'); btn.classList.add('bg-blue-900/30');
                };
                return btn;
            };
            const autoBtn = createBtn(window.t('settings_auto'), -1);
            autoBtn.classList.replace('text-gray-300', 'text-blue-400'); autoBtn.classList.add('bg-blue-900/30');
            qualityOptions.appendChild(autoBtn);
            levels.forEach((level, index) => qualityOptions.appendChild(createBtn(`${Math.min(level.width, level.height)}p`, index)));
        }

        async function loadSubtitles(apiSubtitles = {}) {
            let mergedSubs = {};
            const languageNames = new Intl.DisplayNames(['en'], { type: 'language' });
            try {
                const res = await fetch(`assets/subs_manifest.json?t=${Date.now()}`);
                if (res.ok) {
                    const manifest = await res.json();
                    if (manifest[postId]) manifest[postId].forEach(code => mergedSubs[code] = `assets/subs/${postId}/fromm_${postId}.${code}.vtt`);
                }
            } catch (e) {}

            Object.entries(apiSubtitles).forEach(([code, url]) => {
                if (window.cloudFrontParams && url.includes('channel-contents.frommyarti.com')) url += (url.includes('?') ? '&' : '?') + window.cloudFrontParams;
                mergedSubs[code] = url;
            });

            availableLanguages = Object.keys(mergedSubs);
            if (!availableLanguages.length) return;

            const wheelCcOptions = document.getElementById('wheel-cc-options');
            availableLanguages.forEach((code, index) => {
                const track = document.createElement('track');
                track.kind = 'subtitles'; track.label = languageNames.of(code) || code.toUpperCase();
                track.srclang = code; track.src = mergedSubs[code];
                video.appendChild(track);

                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-2 py-1.5 rounded hover:bg-gray-800 wheel-cc-btn text-gray-300';
                btn.innerHTML = track.label; btn.dataset.index = index;
                btn.onclick = (e) => { e.stopPropagation(); setSubtitle(index); };
                wheelCcOptions.appendChild(btn);
            });
            captionsBtn.classList.remove('opacity-50', 'cursor-not-allowed'); captionsBtn.disabled = false; captionsBtn.title = window.t('settings_subtitles_cc');
            // --- Find Default Language ---
            const langSelector = document.querySelector('.lang-selector');
            
            // This checks localStorage first, then the dropdown, then falls back to 'en'
            let currentLang = localStorage.getItem('fromm_lang') || (langSelector ? langSelector.value : 'en');
            currentLang = currentLang.split('-')[0].toLowerCase(); 

            let targetIndex = availableLanguages.findIndex(code => code.toLowerCase().startsWith(currentLang));
            
            // Fallback to English if Korean (or selected lang) isn't in the subtitle list
            if (targetIndex === -1) {
                targetIndex = availableLanguages.findIndex(code => code.toLowerCase().startsWith('en'));
            }

            // Store it globally instead of activating it
            window.defaultSubtitleIndex = Math.max(0, targetIndex);
        }

        function setSubtitle(index) {
            currentSubtitleIndex = index;
            const subContainer = document.getElementById('custom-subtitle-container');
            subContainer.innerHTML = '';
            Array.from(video.textTracks).forEach((t, i) => {
                t.mode = 'hidden';
                t.oncuechange = (i === index) ? (e) => {
                    const cues = e.target.activeCues;
                    subContainer.innerHTML = cues && cues.length ? `<span class="custom-cue">${Array.from(cues).map(c => c.text.replace(/\n/g, '<br>')).join('<br>')}</span>` : '';
                } : null;
            });
            document.querySelectorAll('.wheel-cc-btn').forEach(btn => {
                if (parseInt(btn.dataset.index) === index) { btn.classList.add('text-blue-400', 'bg-blue-900/30'); btn.classList.remove('text-gray-300'); } 
                else { btn.classList.add('text-gray-300'); btn.classList.remove('text-blue-400', 'bg-blue-900/30'); }
            });
            videoContainer.classList.toggle('captions-on', index >= 0);
        }

        document.querySelector('.wheel-cc-btn[data-index="-1"]').addEventListener('click', (e) => { e.stopPropagation(); setSubtitle(-1); });
        captionsBtn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            currentSubtitleIndex >= 0 ? setSubtitle(-1) : setSubtitle(window.defaultSubtitleIndex);
        });

        function updateStatus(msg) {
            statusBadge.textContent = msg;
            debugStatus.textContent = msg;
            
            // Re-fetch translated states for dynamic coloring
            const isPlaying = msg.includes(window.t('status_playing')) || msg.includes('Playing');
            const isError = msg.includes(window.t('status_error')) || msg.includes('Error');

            statusBadge.className = 'px-3 py-1 rounded-full text-[10px] sm:text-xs font-medium border self-start sm:self-center ' +
                (isPlaying ? 'bg-green-900 text-green-300 border-green-700' :
                    (isError ? 'bg-red-900 text-red-300 border-red-700' : 'bg-gray-800 text-gray-400 border-gray-700'));
        }

        // --- MAIN INITIALIZATION ---
        async function main() {
            try {
                updateStatus(window.t('status_fetching_info'));
                const response = await fetch(`https://channel-api.frommyarti.com/media/posts/${postId}`, {
                    headers: { 'Authorization': token, 'uuid': crypto.randomUUID(), 'channel-id': channelId }
                });
                if (!response.ok) throw new Error("Fetch failed.");
                const data = await response.json();
                const post = data.data.post;
                
                document.getElementById('video-title').textContent = post.title;

                if (post.sharedUrl) {
                    const copyBtn = document.getElementById('copy-url-btn');
                    copyBtn.classList.remove('hidden');
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(post.sharedUrl);
                        copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-400"></i>';
                        lucide.createIcons();
                        setTimeout(() => {
                            copyBtn.innerHTML = '<i data-lucide="link" class="w-4 h-4"></i>';
                            lucide.createIcons();
                        }, 2000);
                    };
                }

                const match = post.url.match(/CloudFront-Key-Pair-Id=([^&]+)&CloudFront-Signature=([^&]+)&CloudFront-Policy=([^&]+)/);
                if (!match) throw new Error("No CloudFront creds.");
                window.cloudFrontParams = `Key-Pair-Id=${match[1]}&Signature=${match[2]}&Policy=${match[3]}`;

                await loadSubtitles(post.subtitle || {});

                let streamUrl = post.url.split('?')[0];
                if (post.type === "live_record" && streamUrl.includes('.m3u8')) {
                    const parts = streamUrl.split('_');
                    if (parts.length > 1) streamUrl = parts.slice(0, -1).join('_') + '.' + parts.pop().split('.').pop();
                }
                streamUrl += '?' + window.cloudFrontParams;

                updateStatus(window.t('status_initializing_player'));
                if (Hls.isSupported()) {
                    hls = new Hls({ maxBufferLength: 300 });
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, (e, d) => {
                        loader.style.display = 'none';
                        updateStatus(window.t('status_ready'));
                        document.getElementById('debug-level').textContent = d.levels.length + ' ' + window.t('debug_levels_found');
                        debugCodecs.textContent = d.levels[0]?.attrs?.CODECS || window.t('debug_unknown');
                        generateQualityControls(d.levels);
                    });
                }
            } catch (err) {
                console.error(err);
                document.querySelector('.animate-spin').style.display = 'none';
                document.getElementById('loader-message').textContent = window.t('status_error_loading');
                updateStatus(window.t('status_error'));
            }
        }
        
        // Use an event listener to guarantee translations are loaded before starting
        window.addEventListener('i18nLoaded', () => {
            main();
        });
    </script>
    <script src="assets/i18n/i18n_data.js"></script>
    <script src="assets/i18n/i18n.js"></script>
</body>
</html>
