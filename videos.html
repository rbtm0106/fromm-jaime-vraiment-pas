<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <nav class="w-full max-w-4xl mb-4 p-4 bg-gray-800 rounded-lg flex justify-between items-center shadow-lg border border-gray-700">
        <div class="flex gap-4">
            <a href="channels.html" class="text-blue-400 hover:text-blue-300 transition-colors" data-i18n="nav_channels">Channels</a>
            <span class="text-white font-semibold border-b-2 border-green-400" data-i18n="nav_videos">Videos</span>
        </div>
        <div class="flex gap-4 items-center">
            <div class="flex gap-2 items-center mr-2 border-r border-gray-700 pr-3">
                <select class="lang-selector bg-gray-800 text-gray-300 text-xs sm:text-sm border border-gray-600 rounded-md focus:outline-none focus:border-blue-400 py-1 px-2 cursor-pointer transition-colors hover:bg-gray-700">
                    <option value="ko">🇰🇷 한국어</option>
                    <option value="en">🇬🇧 English</option>
                </select>
            </div>
            <button onclick="window.open('converter.html', '_blank')" class="flex items-center gap-1.5 px-3 py-1 bg-gray-800 hover:bg-gray-700 border border-gray-600 hover:border-blue-400 rounded-full text-xs font-semibold text-blue-400 transition-colors shadow-sm cursor-pointer">
                <i data-lucide="file-video" class="w-3.5 h-3.5"></i>
                <span data-i18n="nav_guide">.ts to .mp4 Guide</span>
            </button>
            <div id="session-timer" class="hidden flex items-center gap-1.5 px-3 py-1 bg-gray-900 border border-gray-700 rounded-full text-xs font-mono text-gray-400 shadow-inner">
                <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                <span id="time-remaining">--:--</span>
            </div>
            <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                <i data-lucide="log-out" class="w-4 h-4"></i> <span data-i18n="nav_logout">Logout</span>
            </button>
        </div>
    </nav>

    <main class="w-full max-w-4xl">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl border border-gray-700">
            <h1 class="text-2xl font-bold text-blue-400 mb-6 flex items-center gap-2">
                <a href="channels.html" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <!-- This span needs the data-i18n tag -->
                <span data-i18n="title_channel_media">Channel Media</span>
            </h1>

            <div class="flex gap-6 mb-6 border-b border-gray-700">
                <!-- This button needs the data-i18n tag -->
                <button id="tab-lives" onclick="switchTab('live_record')" class="pb-2 font-bold text-blue-400 border-b-2 border-blue-400 transition-colors focus:outline-none" data-i18n="tab_live_vods">
                    Live VODs
                </button>
                
                <!-- This button needs the data-i18n tag -->
                <button id="tab-videos" onclick="switchTab('video')" class="pb-2 font-bold text-gray-400 hover:text-gray-200 border-b-2 border-transparent transition-colors focus:outline-none" data-i18n="tab_uploaded_videos">
                    Uploaded Videos
                </button>
            </div>

            <div id="loader" class="flex flex-col items-center justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-gray-400" data-i18n="status_loading_media">Loading media...</p>
            </div>

            <div id="error-message" class="hidden text-center py-8">
                <p class="text-red-400 mb-4"></p>
            </div>

            <div id="video-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <!-- Videos will be injected here -->
            </div>

            <div class="mt-8 flex justify-center">
                <button id="load-more-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-full shadow transition-all disabled:opacity-50 disabled:cursor-not-allowed hidden">
                    <span data-i18n="btn_load_more">Load More</span>
                </button>
                <p id="no-more-text" class="text-gray-500 italic hidden mt-4" data-i18n="msg_no_more_items">No more items to load.</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const token = localStorage.getItem('fromm_access_token');
        if (!token) window.location.replace('index.html');

        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('channel_id');

        if (!channelId) {
            window.location.replace('channels.html');
        }

        function startSessionTimer() {
            const expiryStr = localStorage.getItem('fromm_token_expiry');
            if (!expiryStr) return;

            const expiryTimestamp = parseInt(expiryStr, 10);
            const timerContainer = document.getElementById('session-timer');
            const timeSpan = document.getElementById('time-remaining');

            timerContainer.classList.remove('hidden');

            function updateTimer() {
                const now = Math.floor(Date.now() / 1000);
                const diff = expiryTimestamp - now;

                if (diff <= 0) {
                    timeSpan.textContent = window.t ? window.t('status_expired') : "Expired";
                    timeSpan.className = "text-red-500 font-bold";
                    timerContainer.classList.add('border-red-500', 'bg-red-900/20');
                    clearInterval(timerInterval);
                    return;
                }

                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;

                if (hours > 0) {
                    timeSpan.textContent = `${hours}h ${minutes}m`;
                } else {
                    timeSpan.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }

                if (diff <= 300) {
                    timeSpan.className = "text-yellow-400 font-bold animate-pulse";
                    timerContainer.classList.add('border-yellow-600');
                }
            }

            updateTimer();
            const timerInterval = setInterval(updateTimer, 1000);
        }

        startSessionTimer();

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('fromm_access_token');
            localStorage.removeItem('fromm_refresh_token');
            localStorage.removeItem('fromm_resource_token');
            localStorage.removeItem('fromm_token_expiry');
            localStorage.removeItem('fromm_device_id');
            window.location.replace('index.html');
        });

        function getDownloadedList() {
            return JSON.parse(localStorage.getItem('fromm_downloaded') || '[]');
        }

        function markAsDownloaded(postId) {
            const list = getDownloadedList();
            const idStr = String(postId);
            if (!list.includes(idStr)) {
                list.push(idStr);
                localStorage.setItem('fromm_downloaded', JSON.stringify(list));
            }
        }

        function updateButtonUI(postId) {
            const list = getDownloadedList();
            const idStr = String(postId);
            const btn = document.getElementById(`dl-btn-${postId}`);

            if (list.includes(idStr) && btn) {
                btn.classList.remove('bg-black/60', 'hover:bg-blue-600', 'text-white');
                btn.classList.add('bg-green-900/80', 'hover:bg-green-600', 'text-green-400', 'border', 'border-green-600');
                btn.title = window.t('title_downloaded');
                btn.innerHTML = '<i data-lucide="check-check" class="w-4 h-4"></i>';
                lucide.createIcons();
            }
        }

        async function downloadVideo(postId, channelId) {
            const btn = document.getElementById(`dl-btn-${postId}`);
            const progressContainer = document.getElementById(`progress-container-${postId}`);
            const progressBar = document.getElementById(`progress-bar-${postId}`);
            const progressStatus = document.getElementById(`progress-status-${postId}`);
            const progressText = document.getElementById(`progress-text-${postId}`);

            if (btn.disabled) return;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="download" class="w-4 h-4 text-gray-400"></i>';
            lucide.createIcons();

            try {
                progressContainer.classList.remove('hidden');
                progressStatus.textContent = window.t('status_fetching_keys');

                const postRes = await fetch(`https://channel-api.frommyarti.com/media/posts/${postId}`, {
                    headers: { 'Authorization': token, 'uuid': crypto.randomUUID(), 'channel-id': channelId }
                });
                const postData = await postRes.json();
                const rawUrl = postData.data.post.url;
                const postType = postData.data.post.type;

                const match = rawUrl.match(/CloudFront-Key-Pair-Id=([^&]+)&CloudFront-Signature=([^&]+)&CloudFront-Policy=([^&]+)/);
                if (!match) throw new Error("No keys found in URL.");
                
                const cloudFrontParams = `Key-Pair-Id=${match[1]}&Signature=${match[2]}&Policy=${match[3]}`;

                let masterUrl = rawUrl.split('?')[0];
                let subText = "";
                let subBaseUrl = "";

                if (postType === "live_record") {
                    const m3u8Match = masterUrl.match(/\S+\.m3u8/);
                    if (m3u8Match) {
                        const baseSplit = m3u8Match[0].split("_");
                        if (baseSplit.length > 1) masterUrl = baseSplit.slice(0, -1).join("_") + "." + baseSplit.pop().split(".").pop();
                    }

                    const masterText = await (await fetch(masterUrl + '?' + cloudFrontParams)).text();
                    let subUrl = masterText.split('\n').find(line => line.includes('.m3u8')).trim();
                    const baseUrl = masterUrl.substring(0, masterUrl.lastIndexOf('/') + 1);
                    if (!subUrl.startsWith('http')) subUrl = baseUrl + subUrl;

                    const paramSeparator = subUrl.includes('?') ? '&' : '?';
                    subText = await (await fetch(subUrl + paramSeparator + cloudFrontParams)).text();
                    subBaseUrl = subUrl.substring(0, subUrl.lastIndexOf('/') + 1);
                } else {
                    const masterText = await (await fetch(masterUrl + '?' + cloudFrontParams)).text();
                    const m3u8Lines = masterText.split('\n').filter(line => line.trim().endsWith('.m3u8'));
                    
                    if (m3u8Lines.length > 0) {
                        let subUrl = m3u8Lines[m3u8Lines.length - 1].trim();
                        const baseUrl = masterUrl.substring(0, masterUrl.lastIndexOf('/') + 1);
                        if (!subUrl.startsWith('http')) subUrl = baseUrl + subUrl;

                        const paramSeparator = subUrl.includes('?') ? '&' : '?';
                        subText = await (await fetch(subUrl + paramSeparator + cloudFrontParams)).text();
                        subBaseUrl = subUrl.substring(0, subUrl.lastIndexOf('/') + 1);
                    } else {
                        subText = masterText;
                        subBaseUrl = masterUrl.substring(0, masterUrl.lastIndexOf('/') + 1);
                    }
                }

                progressStatus.textContent = window.t('status_parsing_playlist');

                let cryptoKey = null;
                let globalIv = null;
                let mediaSequence = 0;

                const seqMatch = subText.match(/#EXT-X-MEDIA-SEQUENCE:(\d+)/);
                if (seqMatch) mediaSequence = parseInt(seqMatch[1], 10);

                const keyMatch = subText.match(/#EXT-X-KEY:METHOD=AES-128,URI="([^"]+)"(?:,IV=0x([0-9A-Fa-f]+))?/);

                if (keyMatch) {
                    progressStatus.textContent = window.t('status_fetching_aes');
                    let keyUrl = keyMatch[1];
                    if (!keyUrl.startsWith('http')) keyUrl = subBaseUrl + keyUrl;

                    let keyUrlWithParams = keyUrl;
                    if (!keyUrlWithParams.includes('Key-Pair-Id')) {
                        keyUrlWithParams += (keyUrlWithParams.includes('?') ? '&' : '?') + cloudFrontParams;
                    }

                    const keyRes = await fetch(keyUrlWithParams);
                    if (!keyRes.ok) throw new Error("Failed to fetch AES key. (Status: " + keyRes.status + ")");

                    const keyData = await keyRes.arrayBuffer();

                    cryptoKey = await crypto.subtle.importKey(
                        "raw", keyData, { name: "AES-CBC" }, false, ["decrypt"]
                    );

                    if (keyMatch[2]) {
                        let hexString = keyMatch[2].padStart(32, '0');
                        globalIv = new Uint8Array(hexString.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                    }
                }

                const tsUrls = subText.split('\n')
                    .filter(line => line.trim().endsWith('.ts'))
                    .map(line => {
                        let tsUrl = line.trim();
                        if (!tsUrl.startsWith('http')) tsUrl = subBaseUrl + tsUrl;
                        if (!tsUrl.includes('Key-Pair-Id')) {
                            tsUrl += (tsUrl.includes('?') ? '&' : '?') + cloudFrontParams;
                        }
                        return tsUrl;
                    });

                const totalChunks = tsUrls.length;
                if (totalChunks === 0) throw new Error("No chunks found");

                progressStatus.textContent = window.t('status_downloading_decrypting');

                const CONCURRENCY_LIMIT = 20;
                let downloadedChunks = new Array(totalChunks);
                let chunksDone = 0;
                const iterator = tsUrls.entries();

                async function downloadWorker() {
                    for (let [index, url] of iterator) {
                        const chunkRes = await fetch(url);
                        if (!chunkRes.ok) throw new Error(`Failed chunk ${index}`);

                        let chunkBuffer = await chunkRes.arrayBuffer();

                        if (cryptoKey) {
                            let currentIv = globalIv;
                            if (!currentIv) {
                                currentIv = new Uint8Array(16);
                                const view = new DataView(currentIv.buffer);
                                view.setUint32(12, mediaSequence + index, false);
                            }

                            try {
                                chunkBuffer = await crypto.subtle.decrypt(
                                    { name: "AES-CBC", iv: currentIv },
                                    cryptoKey,
                                    chunkBuffer
                                );
                            } catch (decErr) {
                                throw new Error(`Decryption failed on chunk ${index}`);
                            }
                        }

                        downloadedChunks[index] = chunkBuffer;

                        chunksDone++;
                        progressText.textContent = `${chunksDone} / ${totalChunks}`;
                        progressBar.style.width = `${(chunksDone / totalChunks) * 100}%`;
                    }
                }

                const workers = Array(CONCURRENCY_LIMIT).fill(null).map(downloadWorker);
                await Promise.all(workers);

                progressStatus.textContent = window.t('status_saving_file');
                progressText.textContent = "";

                const finalBlob = new Blob(downloadedChunks, { type: 'video/mp2t' });
                const downloadUrl = URL.createObjectURL(finalBlob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `fromm_video_${postId}.ts`;
                document.body.appendChild(a);
                a.click();

                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);
                downloadedChunks = [];

                progressContainer.classList.add('hidden');
                markAsDownloaded(postId);

            } catch (err) {
                console.error(err);
                progressStatus.textContent = window.t('status_error');
                progressStatus.classList.add('text-red-500');
                progressBar.classList.add('bg-red-500');
            } finally {
                btn.disabled = false;
                updateButtonUI(postId);
            }
        }

        let allPosts = [];
        let subsManifest = {};
        let currentTab = 'live_record';
        let isLast = true;
        let lastPost = null;
        let isLoading = false;

        function formatKST(timestampMs) {
            try {
                const date = new Date(timestampMs);
                return date.toLocaleString('en-US', {
                    timeZone: 'Asia/Seoul',
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', hour12: true
                });
            } catch (e) {
                return String(timestampMs);
            }
        }

        function switchTab(tabType) {
            currentTab = tabType;

            const tabLives = document.getElementById('tab-lives');
            const tabVideos = document.getElementById('tab-videos');

            if (tabType === 'live_record') {
                tabLives.className = "pb-2 font-bold text-blue-400 border-b-2 border-blue-400 transition-colors focus:outline-none";
                tabVideos.className = "pb-2 font-bold text-gray-400 hover:text-gray-200 border-b-2 border-transparent transition-colors focus:outline-none";
            } else {
                tabVideos.className = "pb-2 font-bold text-blue-400 border-b-2 border-blue-400 transition-colors focus:outline-none";
                tabLives.className = "pb-2 font-bold text-gray-400 hover:text-gray-200 border-b-2 border-transparent transition-colors focus:outline-none";
            }

            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            const noMoreText = document.getElementById('no-more-text');
            const loadMoreBtn = document.getElementById('load-more-btn');

            const filteredVideos = allPosts
                .filter(p => p.type === currentTab && p.isVisible)
                .sort((a, b) => b.displayStartAt - a.displayStartAt);

            let html = '';
            filteredVideos.forEach(video => {
                let progressHtml = '';
                const savedProgress = localStorage.getItem(`fromm_progress_${video.id}`);
                if (savedProgress) {
                    try {
                        const { currentTime, duration } = JSON.parse(savedProgress);
                        if (duration > 0) {
                            const percent = (currentTime / duration) * 100;
                            if (percent > 0.5) {
                                progressHtml = `
                                    <div class="absolute bottom-0 left-0 right-0 h-1 bg-gray-700/80 z-10">
                                        <div class="h-full bg-red-600 shadow-[0_0_8px_rgba(220,38,38,0.8)]" style="width: ${percent}%"></div>
                                    </div>
                                `;
                            }
                        }
                    } catch (e) { }
                }

                const badgeText = currentTab === 'video' ? window.t('tab_uploaded_videos') : window.t('tab_live_vods');
                const hasSubs = subsManifest[video.id] && subsManifest[video.id].length > 0;
                const ccHtml = hasSubs
                    ? `<div class="absolute top-2 left-2 bg-black/70 border border-blue-900/50 px-2 py-1 rounded text-xs text-blue-400 font-mono flex items-center gap-1 shadow-md z-10"><i data-lucide="subtitles" class="w-3 h-3"></i> CC</div>`
                    : '';

                html += `
                    <div class="relative bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-lg group hover:border-blue-400 transition-colors" id="video-card-${video.id}">
                        <a href="player.html?channel_id=${channelId}&post_id=${video.id}" class="block">
                            <div class="relative w-full h-40 overflow-hidden bg-black">
                                <img src="${video.thumbnail.url}" alt="${video.title}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-300">
                                
                                ${ccHtml}

                                <div class="absolute bottom-2 left-2 bg-black/70 px-2 py-1 rounded text-xs text-white font-mono flex items-center gap-1">
                                    <i data-lucide="${currentTab === 'video' ? 'film' : 'play-circle'}" class="w-3 h-3"></i> ${badgeText}
                                </div>
                                ${progressHtml}
                            </div>
                            <div class="p-4">
                                <h2 class="font-semibold text-white text-lg line-clamp-2" title="${video.title}">${video.title}</h2>
                                <p class="text-xs text-gray-400 mt-2 flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-3 h-3"></i> ${formatKST(video.displayStartAt)}
                                </p>
                            </div>
                        </a>

                        <button onclick="downloadVideo('${video.id}', '${channelId}')" id="dl-btn-${video.id}" title="Download Video" class="absolute top-2 right-2 p-2 bg-black/60 hover:bg-blue-600 rounded-full text-white transition-colors z-10 shadow-md">
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </button>

                        <div id="progress-container-${video.id}" class="hidden absolute bottom-0 left-0 right-0 bg-gray-900/95 border-t border-gray-700 p-2 z-20">
                            <div class="text-[10px] text-blue-400 font-mono mb-1 flex justify-between">
                                <span id="progress-status-${video.id}">Downloading...</span>
                                <span id="progress-text-${video.id}">0 / 0</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-1.5">
                                <div id="progress-bar-${video.id}" class="bg-blue-500 h-1.5 rounded-full transition-all duration-200" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });

            if (filteredVideos.length === 0) {
                grid.innerHTML = `<p class="text-gray-400 col-span-full text-center py-8">${window.t('msg_no_media_found')}</p>`;
            } else {
                grid.innerHTML = html;
            }

            lucide.createIcons();
            filteredVideos.forEach(video => updateButtonUI(video.id));
            grid.classList.remove('hidden');

            if (isLast) {
                loadMoreBtn.classList.add('hidden');
                if (allPosts.length > 0) noMoreText.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.remove('hidden');
                noMoreText.classList.add('hidden');
            }
        }

        async function fetchVideos(loadMore = false) {
            if (isLoading) return;
            isLoading = true;

            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('error-message');
            const loadMoreBtn = document.getElementById('load-more-btn');

            if (!loadMore) loader.classList.remove('hidden');
            if (loadMore) loadMoreBtn.querySelector('span').textContent = window.t('status_loading');

            try {
                if (Object.keys(subsManifest).length === 0) {
                    try {
                        const manifestRes = await fetch(`assets/subs_manifest.json?t=${new Date().getTime()}`);
                        if (manifestRes.ok) {
                            subsManifest = await manifestRes.json();
                        }
                    } catch (e) {
                        console.log("No subtitle manifest found yet, skipping CC badges.");
                    }
                }

                let url = `https://channel-api.frommyarti.com/media/posts?labelId=0&channelId=${channelId}&limit=50`;

                if (loadMore && lastPost) {
                    url += `&postId=${lastPost.id}&num=${lastPost.num}&displayStartAt=${lastPost.displayStartAt}`;
                }

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': token,
                        'uuid': crypto.randomUUID(),
                        'channel-id': channelId,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const data = await response.json();

                if (data.success && data.data) {
                    isLast = data.data.isLast !== false;
                    const rawPosts = data.data.posts || [];

                    if (rawPosts.length > 0) {
                        lastPost = rawPosts[rawPosts.length - 1];
                        allPosts = [...allPosts, ...rawPosts];
                    }

                    renderGrid();
                }
            } catch (err) {
                console.error(err);
                if (!loadMore) {
                    errorContainer.classList.remove('hidden');
                    errorContainer.querySelector('p').textContent = window.t('error_failed_load_videos') + err.message;
                } else {
                    alert(window.t('error_failed_load_more'));
                }
            } finally {
                loader.classList.add('hidden');
                isLoading = false;
                if (loadMore) loadMoreBtn.querySelector('span').textContent = window.t('btn_load_more');
            }
        }

        document.getElementById('load-more-btn').addEventListener('click', () => fetchVideos(true));

        // Wait for translations to load before fetching so dynamic text is correct
        window.addEventListener('i18nLoaded', () => {
            fetchVideos();
        });
    </script>
    <script src="assets/i18n/i18n_data.js"></script>
    <script src="assets/i18n/i18n.js"></script>
</body>
</html>
