name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # THIS IS THE FIX: Gets the history so Git can rebase

      - name: Build JSON Manifest
        run: |
          python3 -c '
          import os, json, re
          
          print("--- STARTING MANIFEST GENERATION ---")
          manifest = {}
          subs_dir = "assets/subs"
          
          if os.path.exists(subs_dir):
              for post_id in os.listdir(subs_dir):
                  post_path = os.path.join(subs_dir, post_id)
                  if os.path.isdir(post_path):
                      langs = []
                      for file in os.listdir(post_path):
                          if file.endswith(".vtt"):
                              match = re.search(r"\.([a-z]{2})\.vtt$", file)
                              if match:
                                  langs.append(match.group(1))
                      
                      if langs:
                          manifest[post_id] = langs
                          print(f"Found Post ID: {post_id} | Languages: {langs}")
          else:
              print(f"Warning: Directory {subs_dir} does not exist!")
          
          with open("assets/subs_manifest.json", "w") as f:
              json.dump(manifest, f)
          print("--- MANIFEST SAVED ---")
          '

      - name: Commit and Push Manifest to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/subs_manifest.json
          
          # Check if the file actually changed
          if ! git diff --staged --quiet; then
            echo "Changes detected. Committing and pushing..."
            git commit -m "Auto-update subtitle manifest"
            
            # Safely fetch the absolute latest code, put our commit on top, and push
            git fetch origin main
            git rebase origin/main
            git push origin main
          else
            echo "No subtitle changes detected. Skipping commit."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5