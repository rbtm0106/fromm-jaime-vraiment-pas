name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write  # Needed to push the JSON back to the repo
  pages: write     # Needed for GitHub Pages deployment
  id-token: write  # Needed for GitHub Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build JSON Manifest
        run: |
          python3 -c '
          import os, json, re
          
          manifest = {}
          subs_dir = "assets/subs"
          
          if os.path.exists(subs_dir):
              for post_id in os.listdir(subs_dir):
                  post_path = os.path.join(subs_dir, post_id)
                  if os.path.isdir(post_path):
                      langs = []
                      for file in os.listdir(post_path):
                          if file.endswith(".vtt"):
                              # Extracts "en" from "fromm_7562.en.vtt"
                              match = re.search(r"\.([a-z]{2})\.vtt$", file)
                              if match:
                                  langs.append(match.group(1))
                      
                      if langs:
                          manifest[post_id] = langs
          
          with open("assets/subs_manifest.json", "w") as f:
              json.dump(manifest, f)
          '

      - name: Commit and Push Manifest to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/subs_manifest.json
          # Only pushes a new commit if the JSON file actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update subtitle manifest" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5