name: Generate Subtitle Manifest

on:
  push:
    paths:
      - 'assets/subs/**' # Only triggers when you add/remove subtitles!
  workflow_dispatch: # Allows you to click a button to run it manually

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build JSON Manifest
        run: |
          python3 -c '
          import os, json, re
          
          manifest = {}
          subs_dir = "assets/subs"
          
          if os.path.exists(subs_dir):
              for post_id in os.listdir(subs_dir):
                  post_path = os.path.join(subs_dir, post_id)
                  if os.path.isdir(post_path):
                      langs = []
                      for file in os.listdir(post_path):
                          if file.endswith(".vtt"):
                              # Extracts "en" from "fromm_7562.en.vtt"
                              match = re.search(r"\.([a-z]{2})\.vtt$", file)
                              if match:
                                  langs.append(match.group(1))
                      
                      if langs:
                          manifest[post_id] = langs
          
          # Saves it to assets/subs_manifest.json
          with open("assets/subs_manifest.json", "w") as f:
              json.dump(manifest, f)
          '

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/subs_manifest.json
          # Only commits if the JSON actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update subtitle manifest" && git push)