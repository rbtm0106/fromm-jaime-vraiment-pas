<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans relative">

    <!-- Absolute positioned container for the top right -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-6">
        <select class="lang-selector bg-gray-800 text-gray-300 text-xs sm:text-sm border border-gray-600 rounded-md focus:outline-none focus:border-blue-400 py-1 px-2 cursor-pointer transition-colors hover:bg-gray-700">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇬🇧 English</option>
            <option value="hanyang">☘️ 하냥</option>

        </select>
    </div>

    <!-- Your existing login card -->
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-bold text-center text-blue-400 mb-6">Fromm j'aime vraiment pas!</h1>
        <form id="login-form">
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-300 mb-2" data-i18n="login_email_label">Email</label>
                <input type="email" id="username" autocomplete="username" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-300 mb-2" data-i18n="login_password_label">Password</label>
                <input type="password" id="password" autocomplete="current-password" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div class="mb-4 text-sm text-right">
                <button type="button" id="toggle-advanced" class="text-blue-400 hover:text-blue-300 hover:underline focus:outline-none" data-i18n="show_advanced">
                    Show Advanced Options
                </button>
            </div>

            <div id="advanced-options" class="hidden space-y-4 mb-6">
                <div>
                    <label for="deviceId" class="block text-sm font-medium text-gray-300 mb-2" data-i18n="device_id_label">Device ID (Leave blank to auto-generate)</label>
                    <input type="text" id="deviceId" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div id="status-message" class="text-sm text-center mb-4 hidden"></div>

            <div class="flex gap-2">
                <button type="button" id="check-email-btn" class="w-1/2 px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg font-medium text-white transition-colors">
                    <span data-i18n="btn_check_email">Check Email</span>
                </button>
                <button type="submit" id="login-btn" class="w-1/2 px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <span data-i18n="btn_login">Login</span>
                </button>
            </div>
        </form>
        
        <div id="debug-box" class="mt-4 p-3 bg-gray-900 border border-gray-700 rounded-lg text-xs font-mono text-left hidden break-all overflow-y-auto max-h-48"></div>
    </div>

    <script>
        // --- AUTO-REDIRECT IF LOGGED IN ---
        if (localStorage.getItem('fromm_access_token')) {
            window.location.replace('channels.html');
        }

        // --- UTILS ---
        document.getElementById('toggle-advanced').addEventListener('click', function() {
            const adv = document.getElementById('advanced-options');
            adv.classList.toggle('hidden');
            // Toggle text dynamically using the translation function
            this.textContent = adv.classList.contains('hidden') ? window.t('show_advanced') : window.t('hide_advanced');
        });

        function isValidEmail(email) {
            return /^[\w\.-]+@[\w\.-]+\.\w+$/.test(email);
        }

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.classList.remove('hidden');
            statusEl.className = `text-sm text-center mb-4 block ${isError ? 'text-red-400' : 'text-green-400'}`;
        }

        function showDebug(data) {
            const debugBox = document.getElementById('debug-box');
            debugBox.classList.remove('hidden');
            debugBox.textContent = JSON.stringify(data, null, 2);
        }

        function getOrCreateDeviceId() {
            let id = document.getElementById('deviceId').value.trim();
            if (!id) {
                id = crypto.randomUUID();
                document.getElementById('deviceId').value = id;
            }
            return id;
        }

        // --- THE CRYPTO ENGINE ---
        async function encryptPassword(password, deviceId) {
            const encoder = new TextEncoder();
            const keySource = encoder.encode(deviceId);
            
            const rawKey = keySource.slice(0, 32);
            const iv = rawKey.slice(0, 16);

            const cryptoKey = await crypto.subtle.importKey(
                "raw", rawKey, { name: "AES-CBC" }, false, ["encrypt"]
            );

            const passwordBytes = encoder.encode(password);
            const encryptedBuffer = await crypto.subtle.encrypt(
                { name: "AES-CBC", iv: iv }, cryptoKey, passwordBytes
            );

            return Array.from(new Uint8Array(encryptedBuffer))
                .map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- STEP 1: CHECK EMAIL ---
        document.getElementById('check-email-btn').addEventListener('click', async () => {
            const email = document.getElementById('username').value.trim();
            document.getElementById('debug-box').classList.add('hidden');
            
            // Using a fallback string if you don't add "status_invalid_email" to JSON
            if (!isValidEmail(email)) return showStatus(window.t('status_invalid_email') !== 'status_invalid_email' ? window.t('status_invalid_email') : "Invalid email format.", true);

            // Fetch string from dictionary
            showStatus(window.t('status_checking'), false);

            try {
                const response = await fetch('https://account-api.frommyarti.com/auth/exist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=UTF-8' },
                    body: JSON.stringify({ username: email }) 
                });

                const data = await response.json();
                showDebug(data);

                if (data.success === true) {
                    showStatus(window.t('status_verified'), false);
                    document.getElementById('login-btn').disabled = false;
                } else {
                    showStatus(window.t('status_not_found'), true);
                }
            } catch (err) {
                showStatus(window.t('status_network_error'), true);
            }
        });

        // --- STEP 2: FULL LOGIN ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const deviceId = getOrCreateDeviceId();
            
            // Fallback for missing password
            if (!password) return showStatus(window.t('status_enter_password') !== 'status_enter_password' ? window.t('status_enter_password') : "Please enter your password.", true);

            showStatus(window.t('status_encrypting'), false);

            try {
                const encryptedHex = await encryptPassword(password, deviceId);
                
                const response = await fetch('https://account-api.frommyarti.com/auth/signin', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json; charset=UTF-8',
                        'uuid': deviceId
                    },
                    body: JSON.stringify({ 
                        username: email,
                        password: encryptedHex,
                        deviceId: deviceId,
                        from: "app",
                        allowUpdateDeviceId: true
                    }) 
                });

                const data = await response.json();
                showDebug(data);

                if (data.success && data.data && data.data.accessToken) {
                    showStatus(window.t('status_login_complete'), false);
                    
                    const responseData = data.data;

                    const expiresInSeconds = responseData.expiresIn || 0;
                    let tokenExpiry = null;
                    if (expiresInSeconds > 0) {
                        const currentTimestamp = Math.floor(Date.now() / 1000);
                        tokenExpiry = currentTimestamp + expiresInSeconds;
                    }
                    
                    localStorage.setItem('fromm_access_token', responseData.accessToken);
                    localStorage.setItem('fromm_device_id', deviceId);
                    
                    if (responseData.refreshToken) {
                        localStorage.setItem('fromm_refresh_token', responseData.refreshToken);
                    }
                    if (responseData.resourceToken) {
                        localStorage.setItem('fromm_resource_token', responseData.resourceToken);
                    }
                    if (tokenExpiry) {
                        localStorage.setItem('fromm_token_expiry', tokenExpiry);
                    }
                    
                    console.log("All session data securely stored in localStorage.");
                    window.location.href = 'channels.html';
                } else {
                    showStatus(window.t('status_invalid_password'), true);
                }
            } catch (err) {
                showStatus(window.t('status_network_error'), true);
                showDebug({ error: err.message });
            }
        });
    </script>
    <script src="assets/i18n/i18n_data.js"></script>
    <script src="assets/i18n/i18n.js"></script>
</body>
</html>
