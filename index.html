<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-bold text-center text-blue-400 mb-6">API Sandbox</h1>
        
        <div class="mb-4">
            <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username (email)</label>
            <input type="email" id="username" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <div id="status-message" class="text-sm text-center mb-4 hidden"></div>

        <div>
            <button id="check-email-btn" class="w-full text-center px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg font-medium text-white transition-colors">
                1. Test Email Check
            </button>
        </div>
        
        <div id="debug-box" class="mt-4 p-3 bg-gray-900 border border-gray-700 rounded-lg text-xs font-mono text-left hidden break-all overflow-y-auto max-h-48"></div>
    </div>

    <script>
        // Local regex validation matching your Python util
        function isValidEmail(email) {
            const pattern = /^[\w\.-]+@[\w\.-]+\.\w+$/;
            return pattern.test(email);
        }

        // UI Helpers
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = `text-sm text-center mb-4 block ${isError ? 'text-red-400' : 'text-green-400'}`;
        }

        function showDebug(data) {
            const debugBox = document.getElementById('debug-box');
            debugBox.classList.remove('hidden');
            debugBox.textContent = JSON.stringify(data, null, 2);
        }

        // --- CHECK EMAIL LOGIC ---
        document.getElementById('check-email-btn').addEventListener('click', async () => {
            const email = document.getElementById('username').value.trim();
            const debugBox = document.getElementById('debug-box');
            
            // Clear previous debug
            debugBox.classList.add('hidden');
            
            if (!isValidEmail(email)) {
                showStatus("Invalid email format provided.", true);
                return;
            }

            showStatus("Sending request to Fromm...", false);

            try {
                // Extracted from account_api.py
                const checkUrl = 'https://account-api.frommyarti.com/auth/exist'; 
                
                const response = await fetch(checkUrl, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json; charset=UTF-8'
                    },
                    // Extracted from account_api.py check_user_exists() payload
                    body: JSON.stringify({ 
                        username: email 
                    }) 
                });

                const data = await response.json();
                showDebug(data);

                // Check the API response format
                if (data.success && data.data && data.data.isExist === true) {
                    showStatus("✅ Account found! Network layer is fully operational.", false);
                } else if (data.success && data.data && data.data.isExist === false) {
                    showStatus("❌ API responded, but account does not exist.", true);
                } else {
                    showStatus("⚠️ Received an unexpected successful response structure.", true);
                }
            } catch (err) {
                showStatus("⚠️ Network error or CORS block occurred.", true);
                showDebug({ error: err.message });
            }
        });
    </script>
</body>
</html>
