<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-bold text-center text-blue-400 mb-6">Login</h1>
        
        <div class="mb-4">
            <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username (email)</label>
            <input type="email" id="username" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        
        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
            <input type="password" id="password" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <!-- Advanced Options Toggle -->
        <div class="mb-4 text-sm text-right">
            <button type="button" id="toggle-advanced" class="text-blue-400 hover:text-blue-300 hover:underline focus:outline-none">
                Show Advanced Options
            </button>
        </div>

        <div id="advanced-options" class="hidden space-y-4 mb-6">
            <div>
                <label for="deviceId" class="block text-sm font-medium text-gray-300 mb-2">Device ID (Optional)</label>
                <input type="text" id="deviceId" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Auto-generated if empty">
            </div>
        </div>

        <!-- Status / Error Messages -->
        <div id="status-message" class="text-sm text-center mb-4 hidden"></div>

        <div class="flex gap-2">
            <button id="check-email-btn" class="w-1/2 text-center px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg font-medium text-white transition-colors">
                Check Email
            </button>
            <button id="login-btn" class="w-1/2 text-center px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium text-white transition-colors" disabled>
                Login
            </button>
        </div>
        
        <div id="debug-box" class="mt-4 p-3 bg-gray-900 border border-gray-700 rounded-lg text-xs font-mono text-left hidden break-all"></div>
    </div>

    <script>
        // Toggle Advanced Options[cite: 3]
        document.getElementById('toggle-advanced').addEventListener('click', function() {
            const adv = document.getElementById('advanced-options');
            adv.classList.toggle('hidden');
            this.textContent = adv.classList.contains('hidden') ? 'Show Advanced Options' : 'Hide Advanced Options';
        });

        // Basic Regex check for email[cite: 8]
        function isValidEmail(email) {
            const pattern = /^[\\w\\.-]+@[\\w\\.-]+\\.\\w+$/;
            return pattern.test(email);
        }

        // Show status messages
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = `text-sm text-center mb-4 block ${isError ? 'text-red-400' : 'text-green-400'}`;
        }

        function showDebug(data) {
            const debugBox = document.getElementById('debug-box');
            debugBox.classList.remove('hidden');
            debugBox.textContent = JSON.stringify(data, null, 2);
        }

        // --- CHECK EMAIL LOGIC ---
        document.getElementById('check-email-btn').addEventListener('click', async () => {
            const email = document.getElementById('username').value.trim();
            
            if (!isValidEmail(email)) {
                showStatus("Invalid email format provided.", true);
                return;
            }

            showStatus("Checking email...", false);

            try {
                // TODO: Replace with the actual URL and method your AccountAPI used
                const checkUrl = 'https://api.frommyarti.com/api/v1/ACCOUNT_CHECK_ENDPOINT_HERE'; 
                
                const response = await fetch(checkUrl, {
                    method: 'POST', // or GET?
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email }) // Adjust payload structure as needed
                });

                const data = await response.json();
                showDebug(data);

                if (data.success) {
                    showStatus("Account found! You can now login.", false);
                    document.getElementById('login-btn').disabled = false;
                } else {
                    showStatus("Account not found.", true);
                }
            } catch (err) {
                showStatus("Network error occurred.", true);
                showDebug({ error: err.message });
            }
        });
    </script>
</body>
</html>
