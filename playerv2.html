<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fromm Web Player - Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* --- VIDEO CONTAINER (YouTube Style) --- */
        .video-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: black;
            overflow: hidden; /* Keep wheel inside */
        }

        .video-container.theater,
        .video-container.full-screen {
            max-width: initial;
            width: 100%;
        }

        .video-container.full-screen {
            max-height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease-in-out;
        }

        /* Hide cursor when playing and idle */
        .video-container.playing-idle {
            cursor: none !important;
        }
        .video-container.playing-idle .video-controls-container {
            opacity: 0;
            pointer-events: none;
        }

        /* --- CONTROLS CONTAINER --- */
        .video-controls-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            color: white;
            z-index: 100;
            opacity: 0;
            transition: opacity 150ms ease-in-out;
        }

        .video-controls-container::before {
            content: "";
            position: absolute;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .85), transparent);
            width: 100%;
            aspect-ratio: 6 / 1;
            z-index: -1;
            pointer-events: none;
        }

        .video-container:hover .video-controls-container,
        .video-container:focus-within .video-controls-container,
        .video-container.paused .video-controls-container {
            opacity: 1;
        }

        .video-controls-container .controls {
            display: flex;
            gap: .5rem;
            padding: .5rem;
            align-items: center;
        }

        .video-controls-container .controls button {
            background: none;
            border: none;
            color: inherit;
            padding: 0;
            height: 30px;
            width: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: .85;
            transition: opacity 150ms ease-in-out, transform 150ms ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-controls-container .controls button:hover {
            opacity: 1;
        }

        /* Toggle Icons Display */
        .video-container.paused .pause-icon { display: none; }
        .video-container:not(.paused) .play-icon { display: none; }
        
        .video-container.full-screen .maximize-icon { display: none; }
        .video-container:not(.full-screen) .minimize-icon { display: none; }

        .volume-high-icon, .volume-low-icon, .volume-muted-icon { display: none; }
        .video-container[data-volume-level="high"] .volume-high-icon { display: block; }
        .video-container[data-volume-level="low"] .volume-low-icon { display: block; }
        .video-container[data-volume-level="muted"] .volume-muted-icon { display: block; }

        .video-container.captions-on .cc-icon { color: #60A5FA; /* tailwind blue-400 */ }

        /* --- VOLUME --- */
        .volume-container {
            display: flex;
            align-items: center;
        }

        .volume-slider {
            width: 0;
            transform-origin: left;
            transform: scaleX(0);
            transition: width 150ms ease-in-out, transform 150ms ease-in-out;
            -webkit-appearance: none;
            background: #4b5563;
            height: 4px;
            border-radius: 4px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
        }
        
        .volume-slider::-moz-range-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
        }

        .volume-container:hover .volume-slider,
        .volume-slider:focus-within {
            width: 80px;
            transform: scaleX(1);
            margin-left: 8px;
        }

        .duration-container {
            display: flex;
            align-items: center;
            gap: .25rem;
            flex-grow: 1;
            font-family: monospace;
            font-size: 0.85rem;
            color: #d1d5db;
        }

        /* --- TIMELINE --- */
        .timeline-container {
            height: 7px;
            margin-inline: .5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .timeline {
            background-color: rgba(100, 100, 100, .5);
            height: 3px;
            width: 100%;
            position: relative;
            transition: height 150ms ease-in-out;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            right: calc(100% - var(--preview-position) * 100%);
            background-color: rgb(150, 150, 150);
            display: none;
        }

        .timeline::after {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            right: calc(100% - var(--progress-position) * 100%);
            background-color: red;
        }

        /* Buffer Bar (Custom addition) */
        .timeline .buffer-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.4);
            width: calc(var(--buffer-position) * 100%);
            z-index: -1;
        }

        .timeline .thumb-indicator {
            --scale: 0;
            position: absolute;
            transform: translateX(-50%) scale(var(--scale));
            height: 200%;
            top: -50%;
            left: calc(var(--progress-position) * 100%);
            background-color: red;
            border-radius: 50%;
            transition: transform 150ms ease-in-out;
            aspect-ratio: 1 / 1;
            z-index: 2;
        }

        .video-container.scrubbing .timeline::before,
        .timeline-container:hover .timeline::before {
            display: block;
        }

        .video-container.scrubbing .thumb-indicator,
        .timeline-container:hover .thumb-indicator {
            --scale: 1;
        }

        .video-container.scrubbing .timeline,
        .timeline-container:hover .timeline {
            height: 100%;
        }

        /* --- SETTINGS WHEEL MENU --- */
        #settings-menu {
            position: absolute;
            bottom: 60px;
            right: 16px;
            width: 260px;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #374151;
            border-radius: 8px;
            z-index: 150;
            color: white;
            font-size: 0.875rem;
            pointer-events: auto;
        }

        .settings-section {
            border-bottom: 1px solid #374151;
            padding: 8px;
            max-height: 160px;
            overflow-y: auto;
        }
        .settings-section:last-child { border-bottom: none; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- SUBTITLES OVERLAY --- */
        .custom-cue {
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            font-family: sans-serif;
            font-size: clamp(1rem, 4cqw, 3.5rem);
            text-shadow: 1px 1px 2px black;
            border-radius: 4px;
            padding: 0.3em 0.6em;
            display: inline-block;
            line-height: 1.4;
        }

        #custom-subtitle-container {
            position: absolute;
            bottom: 70px;
            left: 0;
            right: 0;
            width: 100%;
            text-center: center;
            pointer-events: none;
            z-index: 50;
            text-align: center;
            transition: transform 0.3s ease;
        }
    </style>
</head>

<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-2 sm:p-4 font-sans">

    <nav class="w-full max-w-5xl mb-4 p-3 sm:p-4 bg-gray-800 rounded-lg flex justify-between items-center shadow border border-gray-700">
        <div class="flex gap-3 sm:gap-4 text-sm sm:text-base">
            <a href="channels.html" class="text-blue-400 hover:text-blue-300 transition-colors">Channels</a>
            <a href="#" id="back-to-videos" class="text-blue-400 hover:text-blue-300 transition-colors">Videos</a>
        </div>
        <div class="flex gap-2 sm:gap-4 items-center">
            <div id="session-timer" class="hidden flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1 bg-gray-900 border border-gray-700 rounded-full text-[10px] sm:text-xs font-mono text-gray-400 shadow-inner">
                <i data-lucide="clock" class="w-3 h-3"></i>
                <span id="time-remaining">--:--</span>
            </div>
            <button id="logout-btn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1 text-sm sm:text-base">
                <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Logout</span>
            </button>
        </div>
    </nav>

    <main class="w-full max-w-5xl">
        <div class="mb-2 sm:mb-4 flex justify-between items-end gap-2">
            <h1 id="video-title" class="text-lg sm:text-2xl font-bold text-blue-400 truncate w-[70%]">Loading...</h1>
            <p id="post-id-display" class="text-gray-500 text-xs sm:text-sm font-mono shrink-0"></p>
        </div>

        <!-- YOUTUBE STYLE PLAYER CONTAINER -->
        <div class="video-container paused shadow-2xl rounded-xl border border-gray-800 aspect-video" data-volume-level="high" id="video-wrapper">
            <video id="video" crossorigin="anonymous"></video>

            <div id="custom-subtitle-container"></div>

            <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 z-10 pointer-events-none">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500"></div>
                <p id="loader-message" class="mt-4 text-sm text-gray-300">Fetching API...</p>
            </div>

            <!-- SETTINGS WHEEL POPUP -->
            <div id="settings-menu" class="hidden no-scrollbar">
                <!-- Rotation -->
                <div class="settings-section flex justify-between items-center">
                    <span class="text-gray-300 flex items-center gap-2"><i data-lucide="rotate-cw" class="w-4 h-4"></i> Rotation</span>
                    <div class="flex gap-2">
                        <button id="wheel-rotate-ccw" class="p-1 bg-gray-800 rounded hover:bg-gray-700 hover:text-blue-400"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                        <button id="wheel-rotate-cw" class="p-1 bg-gray-800 rounded hover:bg-gray-700 hover:text-blue-400"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <!-- Subtitles -->
                <div class="settings-section">
                    <div class="text-xs text-gray-500 font-bold uppercase mb-1">Subtitles</div>
                    <div id="wheel-cc-options" class="flex flex-col gap-1">
                        <button class="w-full text-left px-2 py-1 rounded hover:bg-gray-800 text-blue-400 bg-blue-900/30 wheel-cc-btn" data-index="-1">Off</button>
                    </div>
                </div>
                <!-- Quality -->
                <div class="settings-section">
                    <div class="text-xs text-gray-500 font-bold uppercase mb-1">Quality</div>
                    <div id="wheel-quality-options" class="flex flex-col gap-1"></div>
                </div>
            </div>

            <div class="video-controls-container">
                <div class="timeline-container">
                    <div class="timeline" style="--progress-position: 0; --preview-position: 0; --buffer-position: 0;">
                        <div class="buffer-bar"></div>
                        <div class="thumb-indicator"></div>
                    </div>
                </div>
                
                <div class="controls">
                    <button class="play-pause-btn">
                        <i data-lucide="play" class="play-icon w-6 h-6 fill-current"></i>
                        <i data-lucide="pause" class="pause-icon w-6 h-6 fill-current"></i>
                    </button>

                    <div class="volume-container">
                        <button class="mute-btn">
                            <i data-lucide="volume-2" class="volume-high-icon w-5 h-5"></i>
                            <i data-lucide="volume-1" class="volume-low-icon w-5 h-5"></i>
                            <i data-lucide="volume-x" class="volume-muted-icon w-5 h-5"></i>
                        </button>
                        <input class="volume-slider" type="range" min="0" max="1" step="any" value="1">
                    </div>

                    <div class="duration-container">
                        <span class="current-time">00:00</span> / <span class="total-time">00:00</span>
                    </div>

                    <!-- Right side controls -->
                    <button class="captions-btn cc-icon opacity-50 cursor-not-allowed" disabled title="No subtitles">
                        <i data-lucide="subtitles" class="w-5 h-5"></i>
                    </button>

                    <button class="settings-btn hover:rotate-90 transition-transform">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>

                    <button class="pip-btn hidden" title="Picture-in-Picture">
                        <i data-lucide="picture-in-picture-2" class="w-5 h-5"></i>
                    </button>

                    <button class="full-screen-btn">
                        <i data-lucide="maximize" class="maximize-icon w-5 h-5"></i>
                        <i data-lucide="minimize" class="minimize-icon w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

    <script>
        lucide.createIcons();

        // --- DOM Elements ---
        const videoContainer = document.querySelector(".video-container");
        const video = document.querySelector("video");
        const playPauseBtn = document.querySelector(".play-pause-btn");
        const fullScreenBtn = document.querySelector(".full-screen-btn");
        const pipBtn = document.querySelector(".pip-btn");
        const muteBtn = document.querySelector(".mute-btn");
        const captionsBtn = document.querySelector(".captions-btn");
        const settingsBtn = document.querySelector(".settings-btn");
        const settingsMenu = document.getElementById("settings-menu");
        
        const currentTimeElem = document.querySelector(".current-time");
        const totalTimeElem = document.querySelector(".total-time");
        const volumeSlider = document.querySelector(".volume-slider");
        const timelineContainer = document.querySelector(".timeline-container");
        const timeline = document.querySelector(".timeline");
        
        const loader = document.getElementById('loader');
        const loaderMessage = document.getElementById('loader-message');

        // Context State
        let hls = null;
        window.cloudFrontParams = "";
        let availableLanguages = [];
        let currentSubtitleIndex = -1;
        let isScrubbing = false;
        let wasPaused = false;
        let idleTimeout = null;

        // PiP Support
        if (document.pictureInPictureEnabled) pipBtn.classList.remove('hidden');

        // --- AUTH ---
        const token = localStorage.getItem('fromm_access_token');
        if (!token) window.location.replace('index.html');
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('post_id');
        const channelId = urlParams.get('channel_id');
        document.getElementById('post-id-display').textContent = `ID: ${postId}`;

        // CloudFront XHR Interceptor
        const originalOpen = XMLHttpRequest.prototype.open;
        window.XMLHttpRequest.prototype.open = function (method, url) {
            if (typeof url === 'string' && url.includes('channel-contents.frommyarti.com') && window.cloudFrontParams) {
                if (!url.includes('Signature=')) {
                    url += (url.includes('?') ? '&' : '?') + window.cloudFrontParams;
                }
            }
            return originalOpen.apply(this, arguments);
        };

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener("keydown", (e) => {
            const tagName = document.activeElement.tagName.toLowerCase();
            if (tagName === "input" || tagName === "textarea") return;

            switch (e.key.toLowerCase()) {
                case " ":
                    if (tagName === "button") return;
                case "k": e.preventDefault(); togglePlayPause(); break;
                case "f": e.preventDefault(); toggleFullScreen(); break;
                case "m": e.preventDefault(); toggleMute(); break;
                case "arrowleft":
                case "j": e.preventDefault(); skip(-5); break;
                case "arrowright":
                case "l": e.preventDefault(); skip(5); break;
                case "c": e.preventDefault(); toggleCaptions(); break;
            }
        });

        // --- TIMELINE SCRUBBING ---
        timelineContainer.addEventListener("mousemove", handleTimelineUpdate);
        timelineContainer.addEventListener("mousedown", toggleScrubbing);
        document.addEventListener("mouseup", e => { if (isScrubbing) toggleScrubbing(e); });
        document.addEventListener("mousemove", e => { if (isScrubbing) handleTimelineUpdate(e); });

        function toggleScrubbing(e) {
            const rect = timelineContainer.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            isScrubbing = (e.buttons & 1) === 1;
            videoContainer.classList.toggle("scrubbing", isScrubbing);
            
            if (isScrubbing) {
                wasPaused = video.paused;
                video.pause();
            } else {
                video.currentTime = percent * video.duration;
                if (!wasPaused) video.play();
            }
            handleTimelineUpdate(e);
        }

        function handleTimelineUpdate(e) {
            const rect = timelineContainer.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            timeline.style.setProperty("--preview-position", percent);

            if (isScrubbing) {
                e.preventDefault();
                timeline.style.setProperty("--progress-position", percent);
            }
        }

        // --- TIME UPDATE & DURATION ---
        video.addEventListener("loadedmetadata", () => {
            totalTimeElem.textContent = formatTime(video.duration);
        });

        video.addEventListener("timeupdate", () => {
            currentTimeElem.textContent = formatTime(video.currentTime);
            const percent = video.currentTime / video.duration;
            if (!isScrubbing) timeline.style.setProperty("--progress-position", percent);
            updateBuffer();
        });

        function updateBuffer() {
            if (!video.duration || !video.buffered.length) return;
            let bufferedEnd = video.currentTime;
            for (let i = 0; i < video.buffered.length; i++) {
                if (video.buffered.start(i) <= video.currentTime && video.buffered.end(i) >= video.currentTime) {
                    bufferedEnd = video.buffered.end(i);
                    break;
                }
            }
            timeline.style.setProperty("--buffer-position", bufferedEnd / video.duration);
        }

        function formatTime(time) {
            if (isNaN(time)) return "00:00";
            const min = Math.floor(time / 60), sec = Math.floor(time % 60), hrs = Math.floor(time / 3600);
            if (hrs > 0) return `${hrs}:${min.toString().padStart(2, "0")}:${sec.toString().padStart(2, "0")}`;
            return `${min}:${sec.toString().padStart(2, "0")}`;
        }

        function skip(seconds) { video.currentTime += seconds; }

        // --- VOLUME ---
        muteBtn.addEventListener("click", toggleMute);
        volumeSlider.addEventListener("input", updateVolume);

        function toggleMute() { video.muted = !video.muted; }

        function updateVolume() {
            video.volume = volumeSlider.value;
            video.muted = volumeSlider.value == 0;
        }

        video.addEventListener("volumechange", () => {
            volumeSlider.value = video.volume;
            let level = video.volume === 0 || video.muted ? "muted" : (video.volume < 0.5 ? "low" : "high");
            videoContainer.dataset.volumeLevel = level;
        });

        // --- PLAY/PAUSE (CLICK ANYWHERE) ---
        playPauseBtn.addEventListener("click", (e) => { e.stopPropagation(); togglePlayPause(); });
        
        // Single click on video toggles play/pause. Stop propagation from controls to prevent double fires.
        videoContainer.addEventListener("click", (e) => {
            if (e.target.closest('.video-controls-container') || e.target.closest('#settings-menu')) return;
            togglePlayPause();
            settingsMenu.classList.add('hidden'); // Clicking video closes settings
        });

        function togglePlayPause() {
            video.paused ? video.play() : video.pause();
        }

        video.addEventListener("play", () => {
            videoContainer.classList.remove("paused");
            startIdleTimer();
        });

        video.addEventListener("pause", () => {
            videoContainer.classList.add("paused");
            videoContainer.classList.remove("playing-idle");
            clearTimeout(idleTimeout);
        });

        // --- IDLE TIMER (Hide controls when playing) ---
        function startIdleTimer() {
            clearTimeout(idleTimeout);
            videoContainer.classList.remove("playing-idle");
            if (!video.paused) {
                idleTimeout = setTimeout(() => {
                    videoContainer.classList.add("playing-idle");
                    settingsMenu.classList.add("hidden");
                }, 3000);
            }
        }
        videoContainer.addEventListener("mousemove", startIdleTimer);
        videoContainer.addEventListener("mouseleave", () => { if (!video.paused) videoContainer.classList.add("playing-idle"); });

        // --- FULLSCREEN & PIP ---
        fullScreenBtn.addEventListener("click", (e) => { e.stopPropagation(); toggleFullScreen(); });
        pipBtn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            else await video.requestPictureInPicture();
        });

        function toggleFullScreen() {
            if (document.fullscreenElement == null) videoContainer.requestFullscreen();
            else document.exitFullscreen();
        }

        videoContainer.addEventListener("fullscreenchange", () => {
            videoContainer.classList.toggle("full-screen", document.fullscreenElement != null);
        });

        // --- SETTINGS WHEEL ---
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('hidden');
        });

        // Rotation
        let currentRot = 0;
        function updateRotation() {
            const scale = (currentRot === 90 || currentRot === 270) ? videoContainer.clientWidth / videoContainer.clientHeight : 1;
            video.style.transform = `rotate(${currentRot}deg) scale(${scale})`;
        }
        document.getElementById('wheel-rotate-cw').addEventListener('click', (e) => { e.stopPropagation(); currentRot = (currentRot + 90) % 360; updateRotation(); });
        document.getElementById('wheel-rotate-ccw').addEventListener('click', (e) => { e.stopPropagation(); currentRot = (currentRot - 90 + 360) % 360; updateRotation(); });
        window.addEventListener('resize', updateRotation);

        // Quality Generator
        function generateQualityControls(levels) {
            const qualityOptions = document.getElementById('wheel-quality-options');
            qualityOptions.innerHTML = '';
            
            const createBtn = (label, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-2 py-1 rounded hover:bg-gray-800 text-gray-300 wheel-qual-btn';
                btn.innerHTML = label;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    hls.currentLevel = index;
                    document.querySelectorAll('.wheel-qual-btn').forEach(b => {
                        b.classList.replace('text-blue-400', 'text-gray-300');
                        b.classList.remove('bg-blue-900/30');
                    });
                    btn.classList.replace('text-gray-300', 'text-blue-400');
                    btn.classList.add('bg-blue-900/30');
                };
                return btn;
            };

            const autoBtn = createBtn('Auto', -1);
            autoBtn.classList.replace('text-gray-300', 'text-blue-400');
            autoBtn.classList.add('bg-blue-900/30');
            qualityOptions.appendChild(autoBtn);

            levels.forEach((level, index) => {
                qualityOptions.appendChild(createBtn(`${Math.min(level.width, level.height)}p`, index));
            });
        }

        // --- SUBTITLES ---
        async function loadSubtitles(apiSubtitles = {}) {
            let mergedSubs = {};
            const languageNames = new Intl.DisplayNames(['en'], { type: 'language' });

            try {
                const res = await fetch(`assets/subs_manifest.json?t=${Date.now()}`);
                if (res.ok) {
                    const manifest = await res.json();
                    if (manifest[postId]) manifest[postId].forEach(code => mergedSubs[code] = `assets/subs/${postId}/fromm_${postId}.${code}.vtt`);
                }
            } catch (e) {}

            Object.entries(apiSubtitles).forEach(([code, url]) => {
                if (window.cloudFrontParams && url.includes('channel-contents.frommyarti.com')) {
                    url += (url.includes('?') ? '&' : '?') + window.cloudFrontParams;
                }
                mergedSubs[code] = url;
            });

            availableLanguages = Object.keys(mergedSubs);
            if (!availableLanguages.length) return;

            const wheelCcOptions = document.getElementById('wheel-cc-options');
            availableLanguages.forEach((code, index) => {
                const track = document.createElement('track');
                track.kind = 'subtitles'; track.label = languageNames.of(code) || code.toUpperCase();
                track.srclang = code; track.src = mergedSubs[code];
                video.appendChild(track);

                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-2 py-1 rounded hover:bg-gray-800 wheel-cc-btn text-gray-300';
                btn.innerHTML = track.label;
                btn.dataset.index = index;
                btn.onclick = (e) => { e.stopPropagation(); setSubtitle(index); };
                wheelCcOptions.appendChild(btn);
            });

            captionsBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            captionsBtn.disabled = false;
            captionsBtn.title = "Subtitles/CC";
        }

        function setSubtitle(index) {
            currentSubtitleIndex = index;
            const subContainer = document.getElementById('custom-subtitle-container');
            subContainer.innerHTML = '';

            Array.from(video.textTracks).forEach((t, i) => {
                t.mode = 'hidden';
                t.oncuechange = (i === index) ? (e) => {
                    const cues = e.target.activeCues;
                    subContainer.innerHTML = cues && cues.length ? `<span class="custom-cue">${Array.from(cues).map(c => c.text.replace(/\n/g, '<br>')).join('<br>')}</span>` : '';
                } : null;
            });

            document.querySelectorAll('.wheel-cc-btn').forEach(btn => {
                if (parseInt(btn.dataset.index) === index) {
                    btn.classList.add('text-blue-400', 'bg-blue-900/30'); btn.classList.remove('text-gray-300');
                } else {
                    btn.classList.add('text-gray-300'); btn.classList.remove('text-blue-400', 'bg-blue-900/30');
                }
            });

            videoContainer.classList.toggle('captions-on', index >= 0);
        }

        document.querySelector('.wheel-cc-btn[data-index="-1"]').addEventListener('click', (e) => { e.stopPropagation(); setSubtitle(-1); });

        function toggleCaptions() {
            if (currentSubtitleIndex >= 0) setSubtitle(-1);
            else {
                const target = Math.max(0, availableLanguages.findIndex(c => c.toLowerCase().startsWith('en')));
                setSubtitle(target);
            }
        }
        captionsBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleCaptions(); });

        // --- MAIN INITIALIZATION ---
        async function main() {
            try {
                const response = await fetch(`https://channel-api.frommyarti.com/media/posts/${postId}`, {
                    headers: { 'Authorization': token, 'uuid': crypto.randomUUID(), 'channel-id': channelId }
                });
                if (!response.ok) throw new Error("Fetch failed.");
                const data = await response.json();
                const post = data.data.post;
                
                document.getElementById('video-title').textContent = post.title;

                const match = post.url.match(/CloudFront-Key-Pair-Id=([^&]+)&CloudFront-Signature=([^&]+)&CloudFront-Policy=([^&]+)/);
                if (!match) throw new Error("No CloudFront creds.");
                window.cloudFrontParams = `Key-Pair-Id=${match[1]}&Signature=${match[2]}&Policy=${match[3]}`;

                await loadSubtitles(post.subtitle || {});

                let streamUrl = post.url.split('?')[0];
                if (post.type === "live_record" && streamUrl.includes('.m3u8')) {
                    const parts = streamUrl.split('_');
                    if (parts.length > 1) streamUrl = parts.slice(0, -1).join('_') + '.' + parts.pop().split('.').pop();
                }
                streamUrl += '?' + window.cloudFrontParams;

                if (Hls.isSupported()) {
                    hls = new Hls({ maxBufferLength: 300 });
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, (e, d) => {
                        loader.style.display = 'none';
                        generateQualityControls(d.levels);
                    });
                }
            } catch (err) {
                console.error(err);
                loaderMessage.textContent = "Error loading stream.";
                document.querySelector('.animate-spin').style.display = 'none';
            }
        }
        main();
    </script>
</body>
</html>
